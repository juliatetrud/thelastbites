<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Last Bites</title>

<!--
  THE LAST BITES
  Sprint 01 — Foundation Scaffold

  Internal canvas resolution: 480×270 (16:9)
  Single-file vanilla JS. No frameworks. No build step.
  See design-docs/ for full design documentation.
-->

<style>
  /* ============================================================
     GOOGLE FONTS — loaded by CDN per 05-tech-architecture.md
     Special Elite  : chrome, labels, prompts
     Cormorant Garamond : narration (italic) and speech (regular)
     ============================================================ */
  @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap');

  /* ============================================================
     LOCKED COLOR TOKENS — from 03b-ui-spec.md §Color Tokens
     Universal tokens: never change per chapter.
     Regional tokens: swap per chapter (Estonia defaults here).
     ============================================================ */
  :root {
    /* Universal text */
    --text-narration:    #fff4d8;
    --text-speaker:      #f0c898;
    --text-prompt:       #c8a878;
    --text-faint:        #8a7858;

    /* Universal panels */
    --panel-bg:          rgba(8, 6, 12, 0.92);
    --panel-bg-deeper:   rgba(20, 16, 32, 0.92);
    --panel-border:      #3a4068;
    --panel-border-soft: rgba(140, 160, 200, 0.22);

    /* Warm pools (home, food, safety) */
    --warm-pool-amber:   #ffc868;
    --warm-pool-deep:    #c87830;
    --warm-pool-glow:    #ffe088;

    /* Spirits */
    --spirit-pip:        #f0f8ff;

    /* Regional — deep moonlit blue (Chapter 1 / ship interior)
       See 03-art-and-aesthetic.md for full regional palette */
    --region-base:       #1c2858;
    --region-deep:       #0e1a3a;
    --region-shadow:     #5a4878;
    --region-floor:      #1a2848;
  }

  /* ============================================================
     BASE LAYOUT
     ============================================================ */
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
    user-select: none;
  }

  /* Full-viewport centering wrapper */
  #game-wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }

  /* 16:9 letterboxed game container.
     Matches the three-doors-demo.html pattern from prototype/.
     Capped at 1440×810 (3× internal resolution) — never scales beyond that.
     z-index: 1 keeps it above #padding-fx (z-index: 0). */
  #game {
    width:  min(100vw, calc(100vh * 16 / 9), 1440px);
    height: min(100vh, calc(100vw * 9  / 16), 810px);
    position: relative;
    overflow: hidden;
    z-index: 1;
  }

  /* The canvas: internal resolution set via width/height attrs (480×270).
     CSS stretches it to fill #game. image-rendering keeps pixels crisp. */
  #canvas {
    width: 100%;
    height: 100%;
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges; /* Firefox */
  }

  /* ============================================================
     VIGNETTE + FILM GRAIN
     Both are CSS-only overlays on top of the canvas.
     Pattern from 03-art-and-aesthetic.md §Aesthetic Rules and
     matching the three-doors-demo.html implementation.
     ============================================================ */
  #grain {
    position: absolute;
    inset: 0;
    pointer-events: none;
    /* Vignette: viewport-sized ellipse centered at the viewport center.
       Using 100vw / 100vh as explicit ellipse radii means the 100% stop falls
       at the viewport edges, so the gradient ramps identically at both the
       game/padding boundary and at the outer viewport edges — no seam.
       (#grain is centered in #game which is centered in the viewport, so
       "50% 50%" of #grain == viewport center.) */
    background-image: radial-gradient(ellipse 100vw 100vh at 50% 50%, transparent 15%, rgba(0, 0, 0, 1.0) 100%);
    z-index: 50;
  }
  #grain::after {
    content: "";
    position: absolute;
    inset: 0;
    /* SVG fractal noise grain */
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.85 0 0 0 0 0.78 0 0 0 0 0.6 0 0 0 0.18 0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
    opacity: 0.45;
    mix-blend-mode: overlay;
    animation: grain-shift 0.4s steps(2) infinite;
  }
  @keyframes grain-shift {
    0%, 100% { transform: translate(0, 0); }
    50%       { transform: translate(-3px, 2px); }
  }

  /* ============================================================
     PADDING-FX — decorative surround rendered behind #game.
     Visible only when #game doesn't fill the full wrap area:
     fullscreen on large displays, or windowed at off-aspect-ratio.
     Contains #padding-grain (extended film grain) and
     #padding-lights (stars + fireflies canvas).
     ============================================================ */
  #padding-fx {
    position: absolute;
    inset: 0;
    /* Same viewport-centered ellipse as #grain — so the darkening ramps
       identically on both sides of the game/padding boundary, eliminating
       the seam. Transparent center is fine: #game-wrap background is #000
       so the transparent areas read as black regardless. */
    background: radial-gradient(ellipse 100vw 100vh at 50% 50%, transparent 15%, rgba(0, 0, 0, 1.0) 100%);
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  #padding-grain {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  /* No vignette on the padding grain — that's intentionally bound to the
     game area. Match only the fractalNoise grain and its animation exactly
     so the texture reads as continuous across the seam. */
  #padding-grain::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.85 0 0 0 0 0.78 0 0 0 0 0.6 0 0 0 0.18 0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
    opacity: 0.45;
    mix-blend-mode: overlay;
    animation: grain-shift 0.4s steps(2) infinite;
  }
  #padding-lights {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  /* ============================================================
     CONTROLS STRIP
     Persistent context-sensitive hint at the bottom of the screen.
     Updates instantly on context change — no transition.
     See 03b-ui-spec.md §1.
     ============================================================ */
  #controls-strip {
    position: absolute;
    bottom: 2%;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Special Elite', serif;
    font-size: clamp(9px, 1.1vw, 12px);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-faint);
    opacity: 0.7;
    text-shadow: 0 0 8px rgba(0,0,0,0.95);
    pointer-events: none;
    white-space: nowrap;
    z-index: 60;
  }

  /* ============================================================
     DIALOGUE BOX
     Primary interaction surface. HTML overlay, not canvas-drawn,
     matching the display pipeline in 05-tech-architecture.md.
     See 03b-ui-spec.md §2 for full spec.
     ============================================================ */
  #dialogue-box {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 10%;
    width: 76%;
    max-width: 700px;
    padding: 16px 24px;
    border-radius: 0;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    backdrop-filter: blur(2px);
    box-sizing: border-box;
    z-index: 70;
    /* Hidden by default; revealed via .active class */
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  #dialogue-box.active {
    opacity: 1;
    pointer-events: auto;
  }
  /* Inner border — the game's signature double-border chrome */
  #dialogue-box::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid var(--panel-border-soft);
    pointer-events: none;
  }

  #dialogue-speaker {
    font-family: 'Special Elite', serif;
    font-size: clamp(10px, 1.3vw, 13px);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-speaker);
    margin-bottom: 8px;
    display: none;
  }

  #dialogue-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(13px, 1.95vw, 19px);
    color: var(--text-narration);
    line-height: 1.5;
    min-height: 1.5em; /* prevents box from collapsing when text is empty */
  }
  #dialogue-text.italic { font-style: italic; }

  #dialogue-choices {
    margin-top: 14px;
    opacity: 0;
    display: none;
    transition: opacity 0.4s ease;
  }
  #dialogue-choices.visible { opacity: 1; }

  .choice-row {
    display: flex;
    align-items: baseline;
    margin-bottom: 6px;
    cursor: pointer;
    padding-left: 0;
    transition: padding-left 0.15s ease;
  }
  .choice-row.selected { padding-left: 2px; }

  .choice-num {
    font-family: 'Special Elite', serif;
    font-size: clamp(10px, 1.3vw, 13px);
    color: var(--text-prompt);
    transition: color 0.15s ease;
    min-width: 1.6em;
    flex-shrink: 0;
  }
  .choice-arrow {
    font-family: 'Special Elite', serif;
    color: var(--text-prompt);
    transition: color 0.15s ease;
    margin: 0 8px;
    flex-shrink: 0;
  }
  .choice-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(13px, 1.85vw, 18px);
    color: var(--text-narration);
    transition: color 0.15s ease;
  }
  .choice-row.selected .choice-num,
  .choice-row.selected .choice-arrow { color: var(--warm-pool-amber); }
  .choice-row.selected .choice-text  { color: var(--warm-pool-glow); }

  /* ============================================================
     MUSIC TOGGLE
     Sits in the top-right viewport margin, outside the canvas.
     Mouse-only — keyboard stays reserved for gameplay.
     ============================================================ */
  #music-toggle {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 32px;
    height: 32px;
    padding: 0;
    border: none;
    background: transparent;
    color: #a0b0d0;
    font-size: 22px;
    line-height: 32px;
    text-align: center;
    cursor: pointer;
    opacity: 0.85;
    z-index: 100;
    transition: opacity 0.2s ease;
    font-family: inherit;
    user-select: none;
  }
  #music-toggle:hover { opacity: 1; }
  #music-toggle.muted { opacity: 0.35; }
  #music-toggle.muted::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 28px;
    height: 1.5px;
    background: currentColor;
    transform: translate(-50%, -50%) rotate(-30deg);
  }

  /* ============================================================
     ROOM TRANSITION OVERLAY
     Full-screen black div fades in/out during room transitions.
     z-index 45 — above canvas and grain, below dialogue and strip.
     Opacity driven by startTransition() via JS.
     ============================================================ */
  #room-transition {
    position: absolute;
    inset: 0;
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
    z-index: 45;
  }

  /* ============================================================
     SPRINT 13: STOMACH INDICATOR
     Top-left corner HUD. The chewing-boy stomach meter.
     See 03b-ui-spec.md §3 for full spec.
     ============================================================ */
  #stomach-indicator {
    position: absolute;
    top: 4%;
    left: 5%;
    width: 44px;
    height: 56px;
    pointer-events: none;
    z-index: 60;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  #stomach-indicator.visible { opacity: 1; }
  #stomach-canvas {
    width: 44px;
    height: 56px;
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  /* ============================================================
     SPRINT 13: NOTEBOOK ICON
     Top-right corner HUD. Destination for pickup tweens.
     ============================================================ */
  #notebook-icon {
    position: absolute;
    top: 4%;
    right: 5%;
    width: 28px;
    height: 36px;
    cursor: pointer;
    z-index: 60;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  #notebook-icon.visible { opacity: 1; }
  #notebook-icon-canvas {
    width: 28px;
    height: 36px;
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  /* Warm-pulse animation on pickup arrival */
  @keyframes notebook-pulse {
    0%   { filter: brightness(1) drop-shadow(0 0 0px rgba(255,200,104,0)); }
    40%  { filter: brightness(1.6) drop-shadow(0 0 8px rgba(255,200,104,0.9)); }
    100% { filter: brightness(1) drop-shadow(0 0 0px rgba(255,200,104,0)); }
  }
  #notebook-icon.pulse {
    animation: notebook-pulse 0.5s ease-out forwards;
  }

  /* ============================================================
     SPRINT 13: PICKUP TWEEN LAYER
     Absolutely-positioned canvas that overlays the game for
     item-tween animations (treat flying to notebook icon).
     ============================================================ */
  #tween-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 65;
  }

  /* ============================================================
     SPRINT 13: BLINK-BACK OVERLAY
     Fades in/out during blink-back sequence.
     z-index: 75 — above dialogue.
     ============================================================ */
  #blink-back-overlay {
    position: absolute;
    inset: 0;
    background: #000;
    opacity: 0;
    pointer-events: none;
    z-index: 75;
    transition: opacity 0.3s ease;
  }

  /* Centered italic narration that appears after respawn */
  #blink-back-text {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(14px, 2.1vw, 20px);
    color: var(--text-narration);
    text-align: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.6s ease;
    z-index: 76;
    text-shadow: 0 0 12px rgba(0,0,0,0.9);
    white-space: nowrap;
  }

  /* ============================================================
     SPRINT 13: NOTEBOOK SCREEN
     Full-screen overlay opened with TAB.
     Three pages: Recipes, Memories, Items.
     See 03b-ui-spec.md §5.
     ============================================================ */
  #notebook-screen {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.8);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
    z-index: 80;
  }
  #notebook-screen.open {
    opacity: 1;
    pointer-events: auto;
  }

  /* The open book spread */
  #notebook-spread {
    width: 86%;
    max-width: 900px;
    aspect-ratio: 16 / 10;
    background: #e8dcc0;
    box-shadow: 0 4px 32px rgba(0,0,0,0.7);
    display: flex;
    position: relative;
    overflow: hidden;
  }

  /* Spine */
  #notebook-spread::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 2px;
    background: #c8b898;
    transform: translateX(-50%);
  }

  .notebook-page {
    flex: 1;
    padding: 6% 7%;
    overflow: hidden;
  }
  .notebook-page-left  { border-right: 1px solid #c8b898; }
  .notebook-page-right { padding-left: 8%; }

  .notebook-page-title {
    font-family: 'Special Elite', serif;
    font-size: clamp(10px, 1.4vw, 14px);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #3a2410;
    margin-bottom: 6%;
  }

  .notebook-items-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8%;
  }

  .notebook-item-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .notebook-item-icon {
    width: 24px;
    height: 24px;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  .notebook-item-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(9px, 1.2vw, 12px);
    color: #3a2410;
    text-align: center;
  }

  .notebook-item-annotation {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(8px, 1vw, 10px);
    color: #6a4820;
    text-align: center;
  }

  .notebook-empty-note {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(11px, 1.5vw, 15px);
    color: #8a7858;
    text-align: center;
    margin-top: 30%;
  }

  .notebook-page-nav {
    position: absolute;
    bottom: 4%;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .notebook-page-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #c8b898;
    transition: background 0.2s ease;
  }
  .notebook-page-dot.active { background: #3a2410; }

  /* Controls strip during notebook */
  /* (Reuses existing #controls-strip positioning; setControlsStrip handles content) */
</style>
</head>
<body>

<!-- Font pre-loading: invisible spans force both fonts to be requested
     from Google Fonts even before any canvas text is drawn. -->
<span style="position:absolute;opacity:0;pointer-events:none;font-family:'Special Elite',serif;font-size:1px;" aria-hidden="true">&nbsp;</span>
<span style="position:absolute;opacity:0;pointer-events:none;font-family:'Cormorant Garamond',serif;font-size:1px;" aria-hidden="true">&nbsp;</span>

<!-- Two audio elements for crossfade switching between tracks.
     A is the initial active track; they alternate roles during crossfades. -->
<audio id="bg-music-a" loop preload="auto"></audio>
<audio id="bg-music-b" loop preload="auto"></audio>

<div id="game-wrap">
  <!-- Decorative padding surround: sits behind #game, fills the wrap. -->
  <div id="padding-fx">
    <div id="padding-grain"></div>
    <canvas id="padding-lights"></canvas>
  </div>
  <div id="game">
    <!-- The game canvas: 480×270 internal resolution, scaled by CSS -->
    <canvas id="canvas" width="480" height="270"></canvas>

    <!-- Grain + vignette overlay sits above the canvas -->
    <div id="grain"></div>

    <!-- Room transition overlay: full-screen black fade between rooms.
         Opacity animated by startTransition() via CSS transition. -->
    <div id="room-transition"></div>

    <!-- Dialogue box: HTML overlay for narration + choices.
         Not canvas-drawn per the display pipeline in 05-tech-architecture.md.
         Managed by showDialogue() / closeDialogue(). -->
    <div id="dialogue-box">
      <div id="dialogue-speaker"></div>
      <div id="dialogue-text"></div>
      <div id="dialogue-choices"></div>
    </div>

    <!-- Sprint 13: Stomach indicator — top-left HUD.
         Canvas-drawn procedural placeholder. See 03b-ui-spec.md §3. -->
    <div id="stomach-indicator">
      <canvas id="stomach-canvas" width="44" height="56"></canvas>
    </div>

    <!-- Sprint 13: Notebook icon — top-right HUD.
         Pickup tween destination; TAB shortcut. -->
    <div id="notebook-icon" title="Notebook (TAB)">
      <canvas id="notebook-icon-canvas" width="28" height="36"></canvas>
    </div>

    <!-- Sprint 13: Tween layer — for pickup animations flying to notebook icon -->
    <canvas id="tween-layer" width="480" height="270"></canvas>

    <!-- Sprint 13: Blink-back overlay + respawn narration text -->
    <div id="blink-back-overlay"></div>
    <div id="blink-back-text">The ship lets him back in.</div>

    <!-- Sprint 13: Notebook screen — TAB opens this full-screen overlay -->
    <div id="notebook-screen">
      <div id="notebook-spread">
        <div class="notebook-page notebook-page-left" id="notebook-page-left">
          <div class="notebook-page-title" id="notebook-left-title">Recipes</div>
          <div id="notebook-left-content" class="notebook-empty-note">Recipe unlocked after first meal.</div>
        </div>
        <div class="notebook-page notebook-page-right" id="notebook-page-right">
          <div class="notebook-page-title" id="notebook-right-title">Memories</div>
          <div id="notebook-right-content" class="notebook-empty-note">Memories collected here.</div>
        </div>
        <div class="notebook-page-nav" id="notebook-page-nav">
          <div class="notebook-page-dot" data-page="0"></div>
          <div class="notebook-page-dot" data-page="1"></div>
          <div class="notebook-page-dot active" data-page="2"></div>
        </div>
      </div>
    </div>

    <!-- Controls strip: persistent context-sensitive bottom hint.
         See 03b-ui-spec.md §1. Managed by setControlsStrip(). -->
    <div id="controls-strip"></div>
  </div>

  <!-- Music toggle: inside #game-wrap so it appears in fullscreen context.
       position: absolute keeps it at viewport top-right in both windowed and
       fullscreen modes. Keyboard binding: M key (see handleKeyAction). -->
  <button id="music-toggle" type="button" title="Music on (click to mute)" aria-label="Music on (click to mute)">♪</button>
</div>

<script>
'use strict';

/* ================================================================
   CONSTANTS
   ================================================================ */

const W = 480;           // internal canvas width  (pixels)
const H = 270;           // internal canvas height (pixels)
const ROOM_W = 960;      // room width in game-world coordinates (2× canvas)
const FLOOR_Y = 180;     // y of the floor surface (feet land here).
                         // Bottom ~30% of the canvas (y=180–270) is the UI zone —
                         // reserved for the dialogue box and controls strip.
                         // Every room must keep game-world content above this line.
                         // Established Sprint 02.5; see 06-roadmap-and-open-questions.md Decisions Log.
const PIP_HALF_W = 12;   // half of Pip's sprite width (24px total)
const PIP_H = 40;        // Pip's sprite height
const PIP_SPEED = 90;    // movement speed, pixels per second (game coords)

/* Float capability — see pip.float state and update() for usage */
const FLOAT_MAX_ALT    = 75;   // max pixels above floor (≈3× sprite height — bumped from 36 after Sprint 02.5 playtest)
const FLOAT_RISE_ACCEL = 220;  // px/s² upward acceleration while Space held
const FLOAT_GRAVITY    = 180;  // px/s² downward acceleration when Space released
const FLOAT_MAX_RISE_V = 80;   // px/s upward speed cap

const HALL_W = 1440;           // hallway width — 3× canvas width

/* ================================================================
   CANVAS SETUP
   ================================================================ */

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

/* Sprint 13: tween layer canvas (for pickup animations) */
const tweenLayer = document.getElementById('tween-layer');
const tweenCtx   = tweenLayer.getContext('2d');

/* Sprint 13: stomach indicator canvas */
const stomachCanvas = document.getElementById('stomach-canvas');
const stomachCtx    = stomachCanvas.getContext('2d');

/* Sprint 13: notebook icon canvas */
const notebookIconCanvas = document.getElementById('notebook-icon-canvas');
const notebookIconCtx    = notebookIconCanvas.getContext('2d');

/* ================================================================
   GAME STATE
   ================================================================ */

const pip = {
  x: ROOM_W / 2,   // game-world x; starts at room center
  y: FLOOR_Y,      // game-world y (feet position)

  body: {
    facing:    'right', // 'left' | 'right'
    animState: 'idle',  // reserved: 'idle' | 'walk' (walk cycles come later)
  },

/* ================================================================
   OPENING SEQUENCE STATE
   Controls the hallway materialization + yawn + narration that plays
   once per hard game load at the start of Chapter 1.
   States: 'materializing' → 'narrating' → 'complete'
   ================================================================ */

const openingSeq = {
  state:         'materializing', // 'materializing' | 'narrating' | 'complete'
  elapsed:       0,               // seconds since sequence began
  MATERIALIZE_T: 1.5,             // total materialization duration
  YAWN_PEAK_T:   0.6,             // yawn peak at this fraction through materialization
  YAWN_END_T:    1.0,             // yawn ends at this fraction through materialization

  /* Pixel reveal mask — built lazily when Pip is first drawn */
  _maskBuilt:    false,
  revealOrder:   [],              // flat array of pixel indices, shuffled

  /* Yawn accessors — computed from elapsed */
  get yawnT() {
    // yawn: 0→1→0 over [0, YAWN_END_T] of MATERIALIZE_T
    const yawnDur = this.YAWN_END_T * this.MATERIALIZE_T;
    const t = Math.min(this.elapsed, yawnDur) / yawnDur;
    if (t <= 0.5) return t * 2;            // open: 0→1
    return 2 - t * 2;                      // close: 1→0
  },
  get isYawning() {
    return this.state === 'materializing' && this.elapsed < (this.YAWN_END_T * this.MATERIALIZE_T);
  },
};
