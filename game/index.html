     Default false — only memory/flashback cinematics set this.
     Mirror and bed-reveal cinematics are present-tense: isMemory = false. */
  isMemory:  false,
};

/* ================================================================
   MUSIC STATE
   Two <audio> elements (A and B) alternate roles during crossfades.
   music.current tracks which is the active element ('a' or 'b').
   Autoplay is deferred until first keypress (browser policy).
   Toggle state persists across reloads via localStorage.
   ================================================================ */

const music = {
  audioA:      null,   // <audio id="bg-music-a">
  audioB:      null,   // <audio id="bg-music-b">
  current:     'a',    // which element is the active track right now
  trackId:     null,   // logical id: 'main' | 'chefs' | 'monster' | null
  on:          true,   // player wants music? (mirrors toggle state)
  unlocked:    false,  // has first keypress fired?
  baseVolume:  0.4,    // target volume when not crossfading
  crossfading: false,
};

/* Logical id → src path (relative to game/index.html). */
const MUSIC_TRACKS = {
  main:  'assets/audio/stowaway-polka.mp3',
  chefs: 'assets/audio/chefs.mp3',
};
const MONSTER_TRACKS = [
  'assets/audio/monster-1.mp3',
  'assets/audio/monster-2.mp3',
];

/* Per-room logical track id.
   All Chapter 1 rooms use 'main'. Kitchen (future sprint) → 'chefs'. */
const ROOM_MUSIC = {
  cabin:        'main',
  hallway:      'main',
  grandparents: 'main',
  // kitchen:   'chefs',  // future sprint
};

/* ================================================================
   PASSENGER STATE
   One-shot scripted NPC. Walks once the first time Pip enters the
   hallway (~1.5s after entry). Silhouette, no glow, no dialogue.
   Aftermath dialogue fires automatically after he exits.
   Scripted-NPC pattern established Sprint 03.
   ================================================================ */

const passenger = {
  active:           false,  // currently mid-walk
  triggered:        false,  // has walked once — no repeat
  hallwayEntered:   false,  // tracks whether first hallway entry happened
  firstEntryTimer:  0,      // counts down from 1.5s on first hallway entry
  x:                0,      // current game-world x
  speed:            105,    // px/s — slightly faster than Pip's 90
  aftermathPending: false,  // true after exit, until aftermath dialogue fires
};

/* Sprint 10.7: game starts in the hallway, so arm the passenger flag here.
   Normally set by startTransition() on first hallway entry; the timer gate
   in updatePassenger() ensures it still waits for the opening sequence. */
passenger.hallwayEntered = true;

/* ================================================================
   DEV FLAG
   ?dev=1 in the URL unlocks abilities that are story-gated in
   production. Float is the first; future abilities (electricity,
   phase-through, memory-gifting) follow the same pattern.
   Engine capability + dev flag arrive together; story unlock
   arrives in the relevant chapter sprint.
   ================================================================ */

const URL_PARAMS = new URLSearchParams(window.location.search);
const DEV_MODE   = URL_PARAMS.get('dev') === '1';

/* ================================================================
   FULLSCREEN STATE
   ================================================================ */

let fullscreenActive = false;

if (DEV_MODE) {
  pip.float.unlocked = true;
  console.log('[dev mode] float unlocked');
}

/* ================================================================
   INPUT
   Held keys tracked via keydown/keyup. Arrow keys and WASD for
   movement. One-shot actions handled in handleKeyAction().
   ================================================================ */

const keysHeld = Object.create(null);

document.addEventListener('keydown', (e) => {
  keysHeld[e.code] = true;
  // Prevent arrow keys / space / TAB from scrolling or focus-navigating the page
  if (
    e.code === 'ArrowLeft'  ||
    e.code === 'ArrowRight' ||
    e.code === 'ArrowUp'    ||
    e.code === 'ArrowDown'  ||
    e.code === 'Space'      ||
    e.code === 'Tab'
  ) {
    e.preventDefault();
  }
  handleKeyAction(e.code);
});

document.addEventListener('keyup', (e) => {
  keysHeld[e.code] = false;
});

/* One-shot key actions — dialogue navigation, inspect trigger.
   Movement is handled via keysHeld in update() (held, not one-shot). */
function handleKeyAction(code) {
  // M — music toggle. Works at all times: gameplay, dialogue, cinematics.
  if (code === 'KeyM') {
    toggleMusic();
    return;
  }

  // Suppress all key actions during room transitions
  if (transition.active) return;

  // Suppress non-music key actions during panic sequence
  if (mirrorBeat.panicPhase !== 'none' && mirrorBeat.panicPhase !== 'done') return;

  // ESC during cinematic — always skippable, regardless of dialogue state
  if (cinematic.active && code === 'Escape') {
    skipCinematic();
    return;
  }

  // ---- Dialogue active ----
  if (dialogue.active && !dialogue.closing) {
    if (dialogue.showingChoices) {
      /* Choice navigation */
      if (code === 'ArrowUp') {
        selectChoice(dialogue.selectedChoice - 1);
      } else if (code === 'ArrowDown') {
        selectChoice(dialogue.selectedChoice + 1);
      } else if (code === 'Space' || code === 'Enter') {
        confirmChoice(dialogue.selectedChoice);
      } else if (code === 'ArrowLeft') {
        // Sprint 11: left-arrow-back — from choice screen, step back to last narration line
        stepDialogueBack();
      } else if (code === 'Digit1') { confirmChoice(0); }
      else if (code === 'Digit2') { confirmChoice(1); }
      else if (code === 'Digit3') { confirmChoice(2); }
      else if (code === 'Digit4') { confirmChoice(3); }
    } else {
      /* Narration mode */
      if (code === 'Space') {
        if (!dialogue.lineComplete) {
          skipTypewriter();
        } else {
          advanceDialogue();
        }
      } else if (code === 'ArrowLeft') {
        // Sprint 11: left-arrow-back — step backward one line (no-op at line 0)
        stepDialogueBack();
      }
    }
    return; // do not fall through to room actions
  }

  // During cinematic hold (dialogue closed but cinematic still active): block room input
  if (cinematic.active) return;

  // ---- Notebook open mode ----
  if (notebook.open) {
    if (code === 'Tab') {
      closeNotebook();
    } else if (code === 'ArrowLeft') {
      notebookTurnPage(-1);
    } else if (code === 'ArrowRight') {
      notebookTurnPage(1);
    }
    // ESC from notebook: reserved for pause menu (Sprint 05 TODO)
    return;
  }

  // ---- Room mode ----
  if (!dialogue.active) {
    if (code === 'ArrowUp' || code === 'KeyW') {
      // Block inspect during opening sequence (Sprint 10.7)
      if (openingSeq.state === 'complete') tryInspect();
    }
    if (code === 'ArrowDown' || code === 'KeyS') {
      // Sprint 13: ↓ COLLECT
      if (openingSeq.state === 'complete' && !blinkBack.active && activeTweens.length === 0) {
        tryCollect();
      }
    }
    if (code === 'Tab') {
      // Sprint 13: TAB opens notebook
      if (openingSeq.state === 'complete' && !blinkBack.active) {
        openNotebook();
      }
    }
    if (code === 'KeyF') {
      toggleFullscreen();
    }
    // ESC: reserved for pause menu (Sprint 05 TODO)
    // TODO: ESC reserved for pause menu — Sprint 05

    // Sprint 13: DEBUG — Shift+Minus drains stomach by 10 for testing blink-back
    if (code === 'Minus' && (keysHeld['ShiftLeft'] || keysHeld['ShiftRight'])) {
      loseStrength(10);
    }
  }
}

function movingLeft()  { return keysHeld['ArrowLeft']  || keysHeld['KeyA']; }
function movingRight() { return keysHeld['ArrowRight'] || keysHeld['KeyD']; }

/* ================================================================
   GAME LOOP
   Standard requestAnimationFrame loop with delta-time movement so
   speed is framerate-independent.
   ================================================================ */

let lastTimestamp = null;

function loop(timestamp) {
  requestAnimationFrame(loop);

  // Delta time in seconds; cap at 100ms to avoid large jumps
  if (lastTimestamp === null) lastTimestamp = timestamp;
  const dt = Math.min((timestamp - lastTimestamp) / 1000, 0.1);
  lastTimestamp = timestamp;

  update(dt);
  render(timestamp);
}

/* ================================================================
   UPDATE
   ================================================================ */

function update(dt) {
  // Opening sequence update (Sprint 10.7) — runs before anything else
  updateOpeningSequence(dt);

  // Blink and float gravity always run — Pip is alive even during transitions
  updateBlink(dt);
  updateFloat(dt);

  // Sprint 11: panic sequence runs when active (overrides player movement)
  updatePanicSequence(dt);

  // Typewriter suppressed during room transitions
  if (dialogue.active && !dialogue.closing && !transition.active) {
    updateDialogue(dt);
  }

  // Cinematic hold timer — auto-starts fade-out after final line
  if (cinematic.active && cinematic.holdTimer > 0 && !cinematic.fadingOut) {
    cinematic.holdTimer -= dt;
    if (cinematic.holdTimer <= 0) {
      cinematic.holdTimer = 0;
      startCinematicFadeOut();
    }
  }

  // Movement gated by dialogue, room transitions, cinematic hold, opening sequence, AND panic sequence
  const panicActive = mirrorBeat.panicPhase !== 'none' && mirrorBeat.panicPhase !== 'done';
  if (!dialogue.active && !transition.active && !cinematic.active && openingSeq.state === 'complete' && !panicActive) {
    const left  = movingLeft();
    const right = movingRight();

    if (left && !right) {
      pip.x -= PIP_SPEED * dt;
      pip.body.facing = 'left';
    }
    if (right && !left) {
      pip.x += PIP_SPEED * dt;
      pip.body.facing = 'right';
    }
    // When stationary, facing retains its last value.

    // Clamp Pip to current room bounds (uses per-room pipMinX from Sprint 10.7)
    const roomMin = rooms[currentRoom].pipMinX !== undefined ? rooms[currentRoom].pipMinX : PIP_HALF_W;
    pip.x = Math.max(roomMin, Math.min(rooms[currentRoom].pipMaxX, pip.x));

    // Room edge triggers — walk into the edge to change rooms
    // Sprint 10.7: cabin exits via left wall (door at x=120) back to hallway at cabin door position (480)
    if (currentRoom === 'cabin' && pip.x <= rooms.cabin.pipMinX + 1) {
      // Exit cabin through the door — return to hallway at the cabin door position
      startTransition('hallway', 'fromRight', 464);   // just left of cabin door at hallway x=480
    } else if (currentRoom === 'grandparents' && pip.x <= PIP_HALF_W + 1) {
      // Return to hallway at the grandparents' door position
      startTransition('hallway', 'fromRight', 1164);
    }
  }

  updatePassenger(dt);

  // Sprint 13: squat timer decay
  if (pip.squatTimer > 0) {
    pip.squatTimer = Math.max(0, pip.squatTimer - dt);
  }

  // Sprint 13: blink-back update
  updateBlinkBack(dt);

  // Sprint 13: controls strip proximity update (only in room mode, not during tweens)
  if (!dialogue.active && !cinematic.active && !notebook.open && !blinkBack.active && activeTweens.length === 0) {
    updateRoomStripForProximity();
  }

  // Sprint 13: tutorial auto-narration for debug Bamsemums proximity
  checkCollectibleTutorialNarration();
}

/* Sprint 13: fire one-time tutorial narration on first approach to a collectible */
function checkCollectibleTutorialNarration() {
  if (dialogue.active || cinematic.active || blinkBack.active || activeTweens.length > 0) return;
  const room = rooms[currentRoom];
  if (!room.collectibles) return;
  for (const c of room.collectibles) {
    if (!c.collected && !c.tutorialNarrated && Math.abs(pip.x - c.x) < 30) {
      c.tutorialNarrated = true;
      showDialogue({
        id: `tutorial-collect-${c.id}`,
        lines: [
          { speaker: null, text: `A small bag of ${c.name}, foam-and-chocolate bears, sits on the counter.`, italic: false },
          { speaker: null, text: "Henrik didn\u2019t say they were for him. They are.", italic: true },
          { speaker: null, text: `He could pocket this. \u2193 to collect. He\u2019ll find it later in his notebook.`, italic: true },
        ],
        choices: null,
        onEnd: null,
      });
      break;
    }
  }
}

/* ----------------------------------------------------------------
   FLOAT UPDATE
   Reads keysHeld['Space'] directly (continuous held input).
   Rising only when: float.unlocked AND no dialogue AND Space held.
   Gravity still applies mid-air when dialogue opens, so Pip
   descends naturally rather than hanging frozen.
   When unlocked===false, altitude is always 0 — no-op every frame.
   ---------------------------------------------------------------- */

function updateFloat(dt) {
  const f      = pip.float;
  const rising = f.unlocked && !dialogue.active && !!keysHeld['Space'];

  if (f.altitude <= 0 && !rising) return; // on the floor, not rising — nothing to do

  if (rising) {
    f.vy = Math.min(FLOAT_MAX_RISE_V, f.vy + FLOAT_RISE_ACCEL * dt);
  } else {
    // Gravity pulls down whether dialogue is active or space is released
    f.vy = Math.max(-(FLOAT_MAX_RISE_V * 1.5), f.vy - FLOAT_GRAVITY * dt);
  }

  f.altitude += f.vy * dt;

  if (f.altitude >= FLOAT_MAX_ALT) {
    f.altitude = FLOAT_MAX_ALT;
    f.vy       = 0;
  } else if (f.altitude <= 0) {
    f.altitude = 0;
    f.vy       = 0;
  }
}

/* ================================================================
   PANIC SEQUENCE  (Sprint 11)
   Scripted post-bed-reveal sequence: float up → hold → descend → glide to door.
   Player input suspended throughout (panicPhase !== 'none' is checked in update).
   Tear particles emitted during glide phase.
   ================================================================ */

const PANIC_FLOAT_TARGET = 30;   // px above floor
const PANIC_RISE_T       = 0.4;  // seconds to rise
const PANIC_HOLD_T       = 0.5;  // seconds to hang
const PANIC_FALL_T       = 0.6;  // seconds to drop back
const PANIC_SPEED        = PIP_SPEED * 1.8;  // 162 px/s

function startPanicSequence() {
  mirrorBeat.panicPhase    = 'floating-up';
  mirrorBeat.panicTimer    = 0;
  mirrorBeat.panicFloatAlt = 0;
  mirrorBeat.tears         = [];
  pip.body.facing          = 'left';  // facing toward cabin door
  setControlsStrip('');  // blank strip — player has no inputs
}

function updatePanicSequence(dt) {
  const mb = mirrorBeat;
  if (mb.panicPhase === 'none' || mb.panicPhase === 'done') return;

  mb.panicTimer += dt;

  switch (mb.panicPhase) {
    case 'floating-up': {
      const t = Math.min(1, mb.panicTimer / PANIC_RISE_T);
      pip.float.altitude = PANIC_FLOAT_TARGET * t;
      if (t >= 1) {
        mb.panicPhase = 'floating-hold';
        mb.panicTimer = 0;
        pip.float.altitude = PANIC_FLOAT_TARGET;
      }
      break;
    }
    case 'floating-hold': {
      // Bob slightly at peak
      pip.float.altitude = PANIC_FLOAT_TARGET + Math.sin(mb.panicTimer * 8) * 1.5;
      if (mb.panicTimer >= PANIC_HOLD_T) {
        mb.panicPhase = 'floating-down';
        mb.panicTimer = 0;
      }
      break;
    }
    case 'floating-down': {
      const t = Math.min(1, mb.panicTimer / PANIC_FALL_T);
      pip.float.altitude = PANIC_FLOAT_TARGET * (1 - t);
      if (t >= 1) {
        pip.float.altitude = 0;
        pip.float.vy = 0;
        mb.panicPhase = 'gliding';
        mb.panicTimer = 0;
        mb.glideStartX = pip.x;
      }
      break;
    }
    case 'gliding': {
      // Move toward cabin door (left)
      pip.x -= PANIC_SPEED * dt;
      pip.body.facing = 'left';

      // Spawn tear particles (~6/s)
      if (Math.random() < dt * 6) {
        const tearVX = PANIC_SPEED * 0.3;   // arc backward (rightward, opposite of movement)
        mb.tears.push({
          x:      pip.x + 4,  // trailing side (facing left, so right side trails)
          y:      pip.y - pip.float.altitude - PIP_H * 0.65,
          vx:     tearVX + (Math.random() - 0.5) * 10,
          vy:     -15 - Math.random() * 10,
          age:    0,
          maxAge: 0.4,
        });
      }

      // Check for cabin exit (left wall)
      if (pip.x <= rooms.cabin.pipMinX + 1) {
        mb.panicPhase = 'done';
        mb.tears = [];
        // Transition to hallway — startTransition restores control and room strip
        startTransition('hallway', 'fromRight', 464);
      }
      break;
    }
  }

  // Update tear particles
  for (let i = mb.tears.length - 1; i >= 0; i--) {
    const t = mb.tears[i];
    t.age += dt;
    t.x   += t.vx * dt;
    t.y   += t.vy * dt;
    t.vy  += 100 * dt;  // gravity
    if (t.age >= t.maxAge) mb.tears.splice(i, 1);
  }
}

/* ----------------------------------------------------------------
   BLINK ANIMATION
   Drives pip.eyes through open → closing → closed → opening → open.
   Timings: 80ms close, 60ms hold, 80ms open.
   Next blink scheduled randomly 3–6 seconds after each complete blink.
   ---------------------------------------------------------------- */

const BLINK_CLOSE_T = 0.08;
const BLINK_HOLD_T  = 0.06;
const BLINK_OPEN_T  = 0.08;

function updateBlink(dt) {
  const e = pip.eyes;
  switch (e.blinkPhase) {
    case 'open':
      e.blinkTimer -= dt;
      if (e.blinkTimer <= 0) {
        e.blinkPhase = 'closing';
        e.blinkT     = 0;
      }
      break;

    case 'closing':
      e.blinkT   += dt;
      e.openness  = Math.max(0, 1.0 - e.blinkT / BLINK_CLOSE_T);
      if (e.blinkT >= BLINK_CLOSE_T) {
        e.blinkPhase = 'closed';
        e.blinkT     = 0;
        e.openness   = 0;
      }
      break;

    case 'closed':
      e.blinkT += dt;
      if (e.blinkT >= BLINK_HOLD_T) {
        e.blinkPhase = 'opening';
        e.blinkT     = 0;
      }
      break;

    case 'opening':
      e.blinkT   += dt;
      e.openness  = Math.min(1.0, e.blinkT / BLINK_OPEN_T);
      if (e.blinkT >= BLINK_OPEN_T) {
        e.blinkPhase  = 'open';
        e.blinkT      = 0;
        e.openness    = 1.0;
        e.blinkTimer  = 3 + Math.random() * 3; // 3–6 seconds
      }
      break;
  }
}

/* ================================================================
   OPENING SEQUENCE (Sprint 10.7)
   Materialization + yawn + narration. Runs once per hard game load.
   Gates player input until 'complete'.
   ================================================================ */

function updateOpeningSequence(dt) {
  if (openingSeq.state === 'complete') return;

  if (openingSeq.state === 'materializing') {
    openingSeq.elapsed += dt;

    if (openingSeq.elapsed >= openingSeq.MATERIALIZE_T) {
      // Materialization done — transition to narrating
      openingSeq.state   = 'narrating';
      openingSeq.elapsed = 0;

      // Show opening narration after a brief pause
      setTimeout(() => {
        showDialogue({
          id: 'opening-narration',
          lines: [
            { speaker: null, text: 'Pip yawns. He doesn\u2019t remember falling asleep, but that\u2019s not unusual. The hallway hums softly around him.', italic: false },
          ],
          choices: null,
          onEnd() {
            openingSeq.state           = 'complete';
            chapterState.openingPlayed = true;
            // Arm the passenger timer now that opening is done
            passenger.firstEntryTimer  = 1.5;
            setRoomStrip();
            // Sprint 13: show HUD once opening completes
            showHUD();
          },
        });
      }, 200);
    }
  }
}

/* ================================================================
   CONTROLS STRIP
   ================================================================ */

const STRIP_STRINGS = {
  // Sprint 13: ↓ COLLECT added; TAB NOTEBOOK replaces ESC JOURNAL
  'room':                 '← →  MOVE     ↑  LOOK     ↓  COLLECT     TAB  NOTEBOOK     ESC  PAUSE',
  'room-floatable':       '← →  MOVE     ↑  LOOK     ↓  COLLECT     SPACE  FLOAT     TAB  NOTEBOOK     ESC  PAUSE',
  'atmospheric-dialogue': '←  BACK     SPACE  CONTINUE',
  'interactive-dialogue': '←  BACK     ↑↓  CHOOSE     SPACE  SELECT',
  'cinematic':            'SPACE  CONTINUE     ESC  SKIP',
  'notebook':             '← →  TURN PAGE     TAB  CLOSE     ESC  PAUSE',
};

function setControlsStrip(context) {
  const raw = STRIP_STRINGS[context] || '';
  // Replace multi-space group separators (3+ spaces) with a fixed-width gap so
  // every hint group is evenly spaced regardless of adjacent character widths.
  // Single/double spaces within a group (key  label) are left as-is.
  document.getElementById('controls-strip').innerHTML =
    raw.replace(/ {3,}/g, '<span style="display:inline-block;width:2.2em"></span>');
}

/* Pick 'room' or 'room-floatable' based on pip.float.unlocked.
   Appends the fullscreen hint. Call anywhere room-mode strip should be shown. */
function setRoomStrip() {
  const base = STRIP_STRINGS[pip.float.unlocked ? 'room-floatable' : 'room'] || '';
  const fsHint = fullscreenActive ? '     F · EXIT FULLSCREEN' : '     F · FULLSCREEN';
  const raw = base + fsHint;
  document.getElementById('controls-strip').innerHTML =
    raw.replace(/ {3,}/g, '<span style="display:inline-block;width:2.2em"></span>');
}

/* Sprint 13: update the controls strip for collectible proximity.
   When Pip is near a collectible, replaces '↓  COLLECT' with
   '↓  COLLECT [NAME]' in warm amber. Called from update() each frame. */
function updateRoomStripForProximity() {
  if (notebook.open || blinkBack.active || dialogue.active || cinematic.active) return;
  const room = rooms[currentRoom];
  if (!room.collectibles) return;
  for (const c of room.collectibles) {
    if (!c.collected && Math.abs(pip.x - c.x) < 18) {
      // Near a collectible — inject the named version
      const base = STRIP_STRINGS[pip.float.unlocked ? 'room-floatable' : 'room'] || '';
      const fsHint = fullscreenActive ? '     F · EXIT FULLSCREEN' : '     F · FULLSCREEN';
      const raw = base + fsHint;
      // Replace the '↓  COLLECT' segment with the named version in amber
      const named = raw.replace(
        '↓  COLLECT',
        `↓  COLLECT <span style="color:var(--warm-pool-amber)">${c.name.toUpperCase()}</span>`
      );
      document.getElementById('controls-strip').innerHTML =
        named.replace(/ {3,}/g, '<span style="display:inline-block;width:2.2em"></span>');
      return;
    }
  }
  // Not near any collectible — set normal room strip
  setRoomStrip();
}

/* ================================================================
   DIALOGUE ENGINE
   Functions: showDialogue, closeDialogue, updateDialogue,
              skipTypewriter, advanceDialogue, showChoices,
              selectChoice, confirmChoice, tryInspect,
              updateDialogueDOM.
   ================================================================ */

/* ---- Open a dialogue node ---- */
function showDialogue(node) {
  // Cancel any pending closeDialogue timeout so stale timers can't kill
  // a new dialogue that starts before the 300ms fade completes.
  if (dialogue._closeTimer !== null) {
    clearTimeout(dialogue._closeTimer);
    dialogue._closeTimer = null;
  }

  dialogue.active         = true;
  dialogue.node           = node;
  dialogue.lineIndex      = 0;
  dialogue.charIndex      = 0;
  dialogue.charTimer      = 0.028;
  dialogue.lineComplete   = false;
  dialogue.showingChoices = false;
  dialogue.selectedChoice = 0;
  dialogue.closing        = false;

  // Reset choices div
  const choicesEl = document.getElementById('dialogue-choices');
  choicesEl.innerHTML = '';
  choicesEl.classList.remove('visible');
  choicesEl.style.display = 'none';

  // Set up first line in DOM (empty — typewriter fills it)
  const line = node.lines[0];
  const speakerEl = document.getElementById('dialogue-speaker');
  speakerEl.style.display = line.speaker ? 'block' : 'none';
  if (line.speaker) speakerEl.textContent = line.speaker;

  const textEl = document.getElementById('dialogue-text');
  textEl.textContent = '';
  textEl.classList.toggle('italic', !!line.italic);

  // Show box
  document.getElementById('dialogue-box').classList.add('active');
  setControlsStrip('atmospheric-dialogue');
}

/* ---- Close the dialogue box (0.3s fade out) ---- */
function closeDialogue() {
  if (dialogue.closing) return;
  dialogue.closing = true;

  document.getElementById('dialogue-box').classList.remove('active');

  dialogue._closeTimer = setTimeout(() => {
    dialogue._closeTimer = null;
    dialogue.active   = false;
    dialogue.closing  = false;
    dialogue.node     = null;

    const choicesEl = document.getElementById('dialogue-choices');
    choicesEl.innerHTML = '';
    choicesEl.classList.remove('visible');
    choicesEl.style.display = 'none';

    setRoomStrip();
  }, 300);
}

/* ---- Typewriter tick (called from update() each frame) ---- */
const CHAR_BASE  = 0.028;                    // 28ms per character
const CHAR_PAUSE = { ',': 0.12, ';': 0.12,  // punctuation extra delays
                     '.': 0.28, '?': 0.28, '!': 0.28 };

function updateDialogue(dt) {
  if (dialogue.lineComplete || dialogue.showingChoices) return;

  dialogue.charTimer -= dt;

  /* While loop handles the case where dt is large enough to reveal
     multiple characters in a single frame (each char has its own delay). */
  while (dialogue.charTimer <= 0 && !dialogue.lineComplete) {
    const line = dialogue.node.lines[dialogue.lineIndex];

    dialogue.charIndex++;

    if (dialogue.charIndex >= line.text.length) {
      dialogue.lineComplete = true;
      dialogue.charTimer    = 0;
      // If this was the last line and there are choices, show them
      if (dialogue.lineIndex === dialogue.node.lines.length - 1 && dialogue.node.choices) {
        showChoices();
      }
    } else {
      // Delay based on the character just revealed
      const prev = line.text[dialogue.charIndex - 1];
      dialogue.charTimer += CHAR_BASE + (CHAR_PAUSE[prev] || 0);
    }
  }

  updateDialogueDOM();
}

/* ---- Instantly complete current line ---- */
function skipTypewriter() {
  const line = dialogue.node.lines[dialogue.lineIndex];
  dialogue.charIndex    = line.text.length;
  dialogue.lineComplete = true;
  dialogue.charTimer    = 0;
  updateDialogueDOM();
  if (dialogue.lineIndex === dialogue.node.lines.length - 1 && dialogue.node.choices) {
    showChoices();
  }
}

/* ---- Advance to next line, choices, or close ---- */
function advanceDialogue() {
  if (!dialogue.lineComplete || dialogue.showingChoices) return;
  const node = dialogue.node;

  if (dialogue.lineIndex < node.lines.length - 1) {
    // More lines to show
    dialogue.lineIndex++;
    dialogue.charIndex    = 0;
    dialogue.charTimer    = CHAR_BASE;
    dialogue.lineComplete = false;

    const line = node.lines[dialogue.lineIndex];
    const speakerEl = document.getElementById('dialogue-speaker');
    speakerEl.style.display = line.speaker ? 'block' : 'none';
    if (line.speaker) speakerEl.textContent = line.speaker;

    const textEl = document.getElementById('dialogue-text');
    textEl.textContent = '';
    textEl.classList.toggle('italic', !!line.italic);
  } else if (node.choices && !dialogue.showingChoices) {
    showChoices();
  } else {
    closeDialogue();
    if (node.onEnd) node.onEnd();
  }
}

/* ---- Sprint 11: Step backward one dialogue line (left-arrow-back) ----
   If at a choice screen: collapses choices, steps back to previous narration line.
   If at first line (index 0): no-op (silently consume the input).
   Re-shows the line in full (no typewriter re-animation). */
function stepDialogueBack() {
  if (!dialogue.active || !dialogue.node) return;

  // If choices are showing, collapse them first then decrement
  if (dialogue.showingChoices) {
    const choicesEl = document.getElementById('dialogue-choices');
    choicesEl.classList.remove('visible');
    choicesEl.innerHTML = '';
    choicesEl.style.display = 'none';
    dialogue.showingChoices = false;
    setControlsStrip('atmospheric-dialogue');
    // Now we're back at the last narration line — show it in full
    _renderDialogueLineImmediate();
    return;
  }

  // Already at first line — no-op
  if (dialogue.lineIndex === 0) return;

  // Decrement
  dialogue.lineIndex--;
  _renderDialogueLineImmediate();
}

/* Render the current dialogue line immediately (no typewriter). */
function _renderDialogueLineImmediate() {
  const line = dialogue.node.lines[dialogue.lineIndex];
  dialogue.charIndex    = line.text.length;
  dialogue.charTimer    = 0;
  dialogue.lineComplete = true;

  const speakerEl = document.getElementById('dialogue-speaker');
  speakerEl.style.display = line.speaker ? 'block' : 'none';
  if (line.speaker) speakerEl.textContent = line.speaker;

  const textEl = document.getElementById('dialogue-text');
  textEl.textContent = line.text;
  textEl.classList.toggle('italic', !!line.italic);
}

/* ---- Fade in the choice list ---- */
function showChoices() {
  if (dialogue.showingChoices) return;
  dialogue.showingChoices = true;
  dialogue.selectedChoice = 0;

  const choicesEl = document.getElementById('dialogue-choices');
  choicesEl.innerHTML = '';

  dialogue.node.choices.forEach((choice, i) => {
    const row = document.createElement('div');
    row.className = 'choice-row' + (i === 0 ? ' selected' : '');
    row.innerHTML =
      `<span class="choice-num">${i + 1}.</span>` +
      `<span class="choice-arrow">→</span>` +
      `<span class="choice-text">${choice.text}</span>`;
    row.addEventListener('mouseover', () => selectChoice(i));
    row.addEventListener('click',     () => confirmChoice(i));
    choicesEl.appendChild(row);
  });

  choicesEl.style.display = 'block';
  // One-frame delay so display:block is painted before opacity transitions
  requestAnimationFrame(() => choicesEl.classList.add('visible'));

  setControlsStrip('interactive-dialogue');
}

/* ---- Move selection highlight ---- */
function selectChoice(idx) {
  if (!dialogue.node || !dialogue.node.choices) return;
  dialogue.selectedChoice = Math.max(0, Math.min(dialogue.node.choices.length - 1, idx));
  document.querySelectorAll('.choice-row').forEach((row, i) => {
    row.classList.toggle('selected', i === dialogue.selectedChoice);
  });
}

/* ---- Confirm the selected choice ---- */
function confirmChoice(idx) {
  if (!dialogue.node || !dialogue.node.choices) return;
  if (idx < 0 || idx >= dialogue.node.choices.length) return;

  const choice = dialogue.node.choices[idx];

  // Hide choices immediately before the next node renders
  const choicesEl = document.getElementById('dialogue-choices');
  choicesEl.classList.remove('visible');
  dialogue.showingChoices = false;

  if (choice.onSelect) {
    choice.onSelect();
  } else {
    closeDialogue();
  }
}

/* ---- Attempt to inspect the nearest object ---- */
function tryInspect() {
  if (dialogue.active) return;
  for (const obj of rooms[currentRoom].objects) {
    if (Math.abs(pip.x - obj.x) < 18) {
      showDialogue(obj.node);
      break;
    }
  }
}

/* ---- Sprint 13: Attempt to collect the nearest collectible (↓) ---- */
function tryCollect() {
  if (dialogue.active) return;
  const room = rooms[currentRoom];
  if (!room.collectibles) { pip.squatTimer = SQUAT_DURATION; return; }
  for (const c of room.collectibles) {
    if (!c.collected && Math.abs(pip.x - c.x) < 18) {
      pickupCollectible(c);
      return;
    }
  }
  // Nothing nearby — squat animation
  pip.squatTimer = SQUAT_DURATION;
}

/* ---- Sprint 13: Execute pickup of a collectible ---- */
function pickupCollectible(c) {
  c.collected = true;

  // Add to notebook items
  notebook.items.push({
    id:         c.id,
    name:       c.name,
    annotation: c.annotation,
    kind:       c.kind,
    sprite:     c.sprite,
  });
  renderNotebookItems();

  // Compute canvas positions for the tween
  // Start: collectible world position → canvas position
  const camX = getCameraX();
  const sx = c.x - camX;
  const sy = FLOOR_Y - 30;   // approximate sprite y on canvas

  // End: notebook icon DOM position → canvas position
  const notebookEl = document.getElementById('notebook-icon');
  const gameEl     = document.getElementById('game');
  const gameRect   = gameEl.getBoundingClientRect();
  const nbRect     = notebookEl.getBoundingClientRect();
  const scaleX     = W / gameRect.width;
  const scaleY     = H / gameRect.height;
  const ex = (nbRect.left + nbRect.width  / 2 - gameRect.left) * scaleX;
  const ey = (nbRect.top  + nbRect.height / 2 - gameRect.top)  * scaleY;

  // Enqueue the pickup tween
  activeTweens.push({
    sx, sy, ex, ey,
    t: 0,
    duration: 0.6,
    sprite: c.sprite,
    kind:   c.kind,
    stomachValue: c.stomachValue || 0,
    onComplete() {
      // Pulse the notebook icon
      const icon = document.getElementById('notebook-icon');
      icon.classList.remove('pulse');
      void icon.offsetWidth; // reflow to restart animation
      icon.classList.add('pulse');
      // If treat: chain stomach refill
      if (c.kind === 'treat') {
        gainStrength(c.stomachValue);
      }
    },
  });

  // Lock input during tween
  setControlsStrip('');
}

/* ---- Sprint 13: Stomach strength functions ---- */
function gainStrength(amount) {
  pip.stomach.value = Math.min(pip.stomach.max, pip.stomach.value + amount);
  renderStomachIndicator();
}

function loseStrength(amount) {
  pip.stomach.value = Math.max(0, pip.stomach.value - amount);
  renderStomachIndicator();
  if (pip.stomach.value <= 0) {
    triggerBlinkBack();
  }
}

/* ---- Sync the dialogue DOM to current dialogue state ---- */
function updateDialogueDOM() {
  const line = dialogue.node.lines[dialogue.lineIndex];
  document.getElementById('dialogue-text').textContent = line.text.slice(0, dialogue.charIndex);
}

/* ================================================================
   CAMERA
   Follows Pip; clamped so the camera never shows beyond the room.
   Starts scrolling once Pip passes the horizontal midpoint of the
   canvas (W/2 = 240px from the left edge).
   ================================================================ */

function getCameraX() {
  return Math.max(0, Math.min(pip.x - W / 2, rooms[currentRoom].width - W));
}

/* ================================================================
   RENDER
   ================================================================ */

function render(now) {
  const camX = getCameraX();

  // Sprint 13: compute dt for tween update (use last frame's now)
  const dt = render._lastNow !== null ? Math.min((now - render._lastNow) / 1000, 0.1) : 0;
  render._lastNow = now;

  ctx.clearRect(0, 0, W, H);

  if (cinematic.active) {
    // Cinematic mode: draw the cinematic scene only; dialogue HTML overlay renders on top
    drawCinematicScene(cinematic.name, now);
  } else {
    rooms[currentRoom].draw(camX, now);

    // Sprint 13: collect auras (warm hum) for collectibles in current room
    drawCollectAuras(camX, now);

    // During materialization, draw Pip using a pixel-reveal mask.
    // After materialization, draw normally.
    if (openingSeq.state === 'materializing') {
      drawObjectAura(camX, now);
      drawPipMaterializing(pip.x - camX, pip.y - pip.float.altitude, now);
    } else {
      drawObjectAura(camX, now);

      // Sprint 13: apply blink-back alpha to Pip
      if (blinkBack.active && blinkBack.pipAlpha < 1.0) {
        ctx.save();
        ctx.globalAlpha = blinkBack.pipAlpha;
      }
      drawPip(pip.x - camX, pip.y - pip.float.altitude, now);
      if (blinkBack.active && blinkBack.pipAlpha < 1.0) {
        ctx.restore();
      }

      // Sprint 11: tear particles during panic glide
      if (mirrorBeat.tears.length > 0) {
        drawTears(camX);
      }

      // Passenger drawn after Pip — renders in front when positions overlap,
      // visually conveying "through Pip" (the no-one-can-see-me rule).
      if (currentRoom === 'hallway' && passenger.active) {
        drawPassenger(passenger.x - camX, FLOOR_Y, now);
      }
    }
  }

  // Sprint 13: update and draw pickup tweens on the tween layer
  updateAndDrawTweens(dt, now);

  // Sprint 13: render HUD canvases every frame (stomach + notebook icon)
  renderStomachIndicator();
  renderNotebookIcon();
}
render._lastNow = null;

/* ----------------------------------------------------------------
   TEAR PARTICLES  (Sprint 11)
   Rendered during panic glide. Cool-white/cyan droplets arc backward.
   ---------------------------------------------------------------- */

function drawTears(camX) {
  ctx.save();
  for (const t of mirrorBeat.tears) {
    const alpha = Math.max(0, 1 - t.age / t.maxAge) * 0.85;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#c0d8ff';
    const sx = t.x - camX;
    const sy = t.y;
    // 2×3 teardrop — taller than wide, rounded top
    ctx.beginPath();
    ctx.moveTo(sx, sy + 3);
    ctx.quadraticCurveTo(sx - 1.5, sy, sx, sy - 3);
    ctx.quadraticCurveTo(sx + 1.5, sy, sx, sy + 3);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

/* ----------------------------------------------------------------
   MATERIALIZING PIP (Sprint 10.7)
   Draws Pip at partial opacity during the opening materialization sequence.
   Uses a simple alpha-ramp for the pixel-by-pixel effect: starts nearly
   transparent with random pixel-level noise, builds to full opacity.
   Also applies the yawn animation (mouth open, eyes narrow).
   ---------------------------------------------------------------- */

function drawPipMaterializing(screenX, groundY, now) {
  const progress = Math.min(1, openingSeq.elapsed / openingSeq.MATERIALIZE_T);

  // Draw Pip to an offscreen canvas, then composite with a pixel-mask effect
  // For simplicity: use canvas alpha + a random-pixel overlay for the "sprinkle" feel
  const cx   = Math.round(screenX);
  const foot = Math.round(groundY + Math.sin(now / 600) * 2);

  ctx.save();
  ctx.translate(cx, foot);
  if (pip.body.facing === 'left') ctx.scale(-1, 1);

  // Apply overall alpha ramp (0→0.85 over MATERIALIZE_T)
  ctx.globalAlpha = progress * 0.85;

  // Apply yawn modifications before drawing
  const savedOpenness  = pip.eyes.openness;
  const savedMouth     = { ...pip.mouth };
  const yawnT = openingSeq.isYawning ? openingSeq.yawnT : 0;

  if (yawnT > 0) {
    // Eyes narrow during yawn: openness → slit
    pip.eyes.openness = Math.max(0.1, 1 - yawnT * 0.9);
  }

  drawPipBody();
  drawPipEyes();

  // Yawn mouth: open wide at peak
  if (yawnT > 0) {
    drawPipMouthYawn(yawnT);
  } else {
    drawPipMouth();
  }

  // Restore
  pip.eyes.openness = savedOpenness;
  Object.assign(pip.mouth, savedMouth);

  // Pixel-sprinkle overlay: random dark pixels that "reveal" as progress increases
  // Creates a dithering dissolve effect on top of the fading alpha
  if (progress < 0.95) {
    const spriteW = 26, spriteH = 42;
    const left = -spriteW / 2, top = -spriteH;
    const pixelCount = spriteW * spriteH;
    const hiddenRatio = 1 - progress;

    // Draw dark "hidden" pixels randomly across the sprite area
    ctx.globalAlpha = hiddenRatio * 0.6;
    ctx.fillStyle   = '#080e20';   // room background color
    // Use a seeded-ish pattern for stability (based on position, not random each frame)
    for (let i = 0; i < pixelCount * hiddenRatio * 0.8; i++) {
      // Use a deterministic but scattered pattern
      const seed  = (i * 1664525 + 1013904223) & 0xffffffff;
      const px    = left + ((seed & 0xff) % spriteW);
      const py    = top  + (((seed >> 8) & 0xff) % spriteH);
      ctx.fillRect(px, py, 1, 1);
    }
  }

  ctx.restore();
}

/* Yawn mouth draw — replaces neutral dot with open oval */
function drawPipMouthYawn(yawnT) {
  const headCY = -PIP_H + 12;   /* −28 */
  const m      = pip.mouth;

  // Open mouth: oval shape, 4×3px at peak, tapers at start/end
  const openW = Math.round(yawnT * 4);
  const openH = Math.round(yawnT * 3);
  if (openW < 2 || openH < 2) {
    // Too small — draw the regular dot
    ctx.globalAlpha = 0.65;
    ctx.fillStyle   = '#1a1428';
    ctx.fillRect(Math.round(m.offsetX), headCY + 8 + Math.round(m.offsetY), 2, 2);
    return;
  }

  ctx.globalAlpha = 0.75;
  ctx.fillStyle   = '#1a1428';
  // Draw mouth oval centered at mouth position
  const mx = Math.round(m.offsetX);
  const my = headCY + 8 + Math.round(m.offsetY);
  ctx.beginPath();
  ctx.ellipse(mx + 1, my + 1, openW / 2, openH / 2, 0, 0, Math.PI * 2);
  ctx.fill();
}

/* ================================================================
   VISUAL PRIMITIVES
   Reusable canvas-drawing functions composed by per-room draw
   functions. Each is self-contained: sets its own fill/stroke and
   restores only state it explicitly saved. No room-specific globals.
   Ordering: structure (panel, baseboard, floor) → apertures
   (porthole, sconce) → openings (brass fitting, door).
   ================================================================ */

/* drawShipPanel — one riveted metal wall panel.
   Strokes the panel outline; places 2×2 rivet dots at all four
   corners (4px inset) when rivets:true (default).
   x, y = top-left of the panel (screen coords).
   options: { rivets=true, strokeColor, rivetColor } */
function drawShipPanel(x, y, w, h, opts) {
  const {
    rivets      = true,
    strokeColor = 'rgba(60,80,140,0.22)',
    rivetColor  = 'rgba(70,90,145,0.35)',
  } = opts || {};
  ctx.strokeStyle = strokeColor;
  ctx.lineWidth   = 1;
  ctx.strokeRect(x, y, w, h);
  if (rivets) {
    const m = 4;
    ctx.fillStyle = rivetColor;
    ctx.fillRect(x + m,         y + m,         2, 2);
    ctx.fillRect(x + w - m - 2, y + m,         2, 2);
    ctx.fillRect(x + m,         y + h - m - 2, 2, 2);
    ctx.fillRect(x + w - m - 2, y + h - m - 2, 2, 2);
  }
}

/* drawBaseboard — dark strip just above the floor line.
   Intentionally darker than the lifted wall: contrast anchor.
   x, y = top-left of the band (y ≈ FLOOR_Y − h).
   options: { h=12, fillColor, strokeColor } */
function drawBaseboard(x, y, w, opts) {
  const {
    h           = 12,
    fillColor   = 'rgba(22,35,62,0.68)',
    strokeColor = 'rgba(70,55,95,0.38)',
  } = opts || {};
  ctx.fillStyle   = fillColor;
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = strokeColor;
  ctx.lineWidth   = 1;
  ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + w, y); ctx.stroke();
}

/* drawFloorPlanks — vertical plank-seam lines in the floor band.
   Scrolls at full camera speed (foreground parallax).
   options: { y=FLOOR_Y, h=20, spacing=48, lineColor } */
function drawFloorPlanks(camX, opts) {
  const {
    y         = FLOOR_Y,
    h         = 20,
    spacing   = 48,
    lineColor = 'rgba(0,0,0,0.18)',
  } = opts || {};
  const offset = camX % spacing;
  ctx.strokeStyle = lineColor;
  ctx.lineWidth   = 1;
  for (let px = -offset; px < W + spacing; px += spacing) {
    ctx.beginPath();
    ctx.moveTo(Math.round(px), y);
    ctx.lineTo(Math.round(px), y + h);
    ctx.stroke();
  }
}

/* drawPorthole — circular ship window.
   Brass ring, dark glass interior, optional pane-divider cross,
   optional distant-shore lighting (moonlight mode).
   x, y = centre (screen coords). radius = outer brass ring.
   options: { moonlight=false, divider=true } */
function drawPorthole(x, y, radius, opts) {
  const { moonlight = false, divider = true } = opts || {};
  const r  = radius;
  const ri = r - 3;   // inner glass edge (inside brass)

  // Outer bevel
  ctx.strokeStyle = 'rgba(50,35,15,0.6)';
  ctx.lineWidth   = 2;
  ctx.beginPath(); ctx.arc(x, y, r + 2, 0, Math.PI * 2); ctx.stroke();

  // Brass ring
  ctx.strokeStyle = '#8a6c3c';
  ctx.lineWidth   = 3;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.stroke();

  // Dark glass
  ctx.fillStyle = '#0a1428';
  ctx.beginPath(); ctx.arc(x, y, ri, 0, Math.PI * 2); ctx.fill();

  if (moonlight) {
    ctx.save();
    ctx.beginPath(); ctx.arc(x, y, ri, 0, Math.PI * 2); ctx.clip();
    // Water shimmer
    const waterGrad = ctx.createRadialGradient(x, y + ri * 0.25, 0, x, y, ri);
    waterGrad.addColorStop(0, 'rgba(40,70,110,0.28)');
    waterGrad.addColorStop(1, 'rgba(10,20,40,0)');
    ctx.fillStyle = waterGrad;
    ctx.fill();
    // Warm shore pinprick lights
    ctx.fillStyle = 'rgba(255,215,150,0.6)';
    for (const [dx, dy] of [[-ri*.28,-ri*.10],[-ri*.08,-ri*.17],[ri*.14,-ri*.07],[ri*.33,-ri*.13]]) {
      ctx.beginPath(); ctx.arc(x + dx, y + dy, 0.8, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }

  if (divider) {
    ctx.save();
    ctx.beginPath(); ctx.arc(x, y, ri, 0, Math.PI * 2); ctx.clip();
    ctx.strokeStyle = 'rgba(80,105,155,0.35)';
    ctx.lineWidth   = 1;
    ctx.beginPath();
    ctx.moveTo(x - ri, y); ctx.lineTo(x + ri, y);
    ctx.moveTo(x, y - ri); ctx.lineTo(x, y + ri);
    ctx.stroke();
    ctx.restore();
  }

  // Brass ring highlight (top-left arc)
  ctx.strokeStyle = 'rgba(185,155,85,0.45)';
  ctx.lineWidth   = 1;
  ctx.beginPath(); ctx.arc(x, y, r - 1, Math.PI, Math.PI * 1.75); ctx.stroke();
}

/* drawSconce — brass wall sconce with warm light pool.
   Refactored from the hallway's inline sconce loop.
   options: { flicker=false, intensity=0.7, now=0 }
   'now' is required when flicker=true. */
function drawSconce(x, y, opts) {
  const { flicker = false, intensity = 0.7, now = 0 } = opts || {};

  // Bracket brightness — sputtering lamps dim the whole fixture
  const bracketB = flicker
    ? 0.55 + Math.sin(now * 0.0061) * 0.18 + Math.sin(now * 0.0113) * 0.11
    : intensity;

  // Flame flicker — all lamps have a gentle sine-wave on size/opacity;
  // flicker:true adds a faster, jerkier second wave to simulate sputtering.
  const gentleFlame = 0.82 + Math.sin(now * 0.0047) * 0.12 + Math.sin(now * 0.0031) * 0.06;
  const flameScale = flicker
    ? gentleFlame + Math.sin(now * 0.0193) * 0.22 + Math.sin(now * 0.0271) * 0.14
    : gentleFlame;
  const flameAlpha = Math.max(0.5, Math.min(1.0, flameScale));

  // ── Brass bracket (8×16 vertical arm + 14×6 wall cap) ──
  ctx.globalAlpha = bracketB;
  ctx.fillStyle   = '#a08664';
  ctx.fillRect(x - 4, y,     8, 16);   // arm
  ctx.fillRect(x - 7, y - 6, 14,  6);  // cap

  // Small downturn hook at bracket tip — the lamp cradle
  ctx.fillStyle = '#8a7050';
  ctx.fillRect(x + 2, y + 14, 4, 4);   // hook stub right side
  ctx.fillRect(x - 6, y + 16, 8, 2);   // cradle bar

  // ── Glass globe (oil-lamp belly, ~10px tall × 8px wide) ──
  // Globe sits just above the bracket tip, centered at x
  const gx = x, gy = y + 9;  // globe centre
  const gW = 8, gH = 10;     // belly half-extents

  // Glass body — shoulder shape: filled ellipse for belly
  ctx.globalAlpha = bracketB * 0.55;
  ctx.fillStyle   = 'rgba(200,180,120,0.4)';
  ctx.beginPath();
  ctx.ellipse(gx, gy, gW / 2, gH / 2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Narrow neck at top
  ctx.fillStyle = 'rgba(180,160,100,0.55)';
  ctx.fillRect(gx - 2, gy - gH / 2 - 3, 4, 4);

  // Highlight arc — light glinting off glass
  ctx.globalAlpha = bracketB * 0.35;
  ctx.strokeStyle = 'rgba(255,240,180,0.7)';
  ctx.lineWidth   = 1;
  ctx.beginPath();
  ctx.arc(gx - 1, gy - 2, gW / 2 - 1, Math.PI * 1.05, Math.PI * 1.65);
  ctx.stroke();

  // ── Teardrop flame inside globe ──
  const fcy = gy - 1;   // flame base y
  const fH  = Math.round(5 * flameScale);   // flame height varies with flicker
  const fW  = 2;

  ctx.globalAlpha = flameAlpha * bracketB;
  // Outer flame body — orange
  ctx.fillStyle = 'rgba(255,160,40,0.9)';
  ctx.beginPath();
  ctx.moveTo(gx,       fcy - fH);          // tip
  ctx.bezierCurveTo(
    gx + fW,  fcy - fH * 0.4,
    gx + fW,  fcy,
    gx,       fcy + 1
  );
  ctx.bezierCurveTo(
    gx - fW,  fcy,
    gx - fW,  fcy - fH * 0.4,
    gx,       fcy - fH
  );
  ctx.fill();

  // Inner flame core — bright yellow
  ctx.globalAlpha = flameAlpha * bracketB * 0.8;
  ctx.fillStyle = 'rgba(255,230,120,1)';
  const cH = Math.max(1, Math.round(fH * 0.5));
  ctx.beginPath();
  ctx.moveTo(gx,         fcy - fH + 1);
  ctx.bezierCurveTo(
    gx + 1,  fcy - fH * 0.35,
    gx + 1,  fcy - 1,
    gx,      fcy
  );
  ctx.bezierCurveTo(
    gx - 1,  fcy - 1,
    gx - 1,  fcy - fH * 0.35,
    gx,      fcy - fH + 1
  );
  ctx.fill();

  // ── Warm light pool on wall ──
  ctx.globalAlpha = bracketB * 0.13;
  const lightGrad = ctx.createRadialGradient(x, y + 8, 0, x, y + 8, 30);
  lightGrad.addColorStop(0, 'rgba(255,218,120,1)');
  lightGrad.addColorStop(1, 'rgba(255,180,80,0)');
  ctx.fillStyle = lightGrad;
  ctx.fillRect(x - 30, y - 22, 60, 52);

  ctx.globalAlpha = 1;
}

/* drawBrassFitting(x, y, type, w) — small brass door detail.
   'plaque'    — room-number plate, centered at x,y.
   'handle'    — lever + escutcheon at pull-side edge (x = edge).
   'kickplate' — strip at door bottom (x = left edge, w = door width). */
function drawBrassFitting(x, y, type, w) {
  ctx.fillStyle = '#a08650';
  if (type === 'plaque') {
    ctx.fillRect(x - 5, y - 2, 10, 4);
    ctx.strokeStyle = 'rgba(80,60,20,0.5)';
    ctx.lineWidth   = 0.5;
    ctx.strokeRect(x - 5, y - 2, 10, 4);
  } else if (type === 'handle') {
    ctx.fillRect(x - 1, y - 2, 2, 5);
    ctx.beginPath(); ctx.arc(x, y - 3, 1.5, 0, Math.PI * 2); ctx.fill();
  } else if (type === 'kickplate') {
    const kw = w || 20;
    ctx.fillRect(x, y, kw, 3);
    ctx.strokeStyle = 'rgba(80,60,20,0.4)';
    ctx.lineWidth   = 0.5;
    ctx.strokeRect(x, y, kw, 3);
  }
}

/* drawDoor(sx, doorTop, options) — ship corridor door with optional
   warm under-glow and brass fittings. Composes drawBrassFitting.
   Visuals only — sparkle overlay handles interactivity separately.
   sx = horizontal centre (screen x). doorTop = top y.
   options: { w=24, h=64, warm=false } */
function drawDoor(sx, doorTop, opts) {
  const { w = 24, h = 64, warm = false } = opts || {};
  const dl = sx - Math.floor(w / 2);   // door left edge

  if (warm) {
    const gpGlow = ctx.createLinearGradient(sx, doorTop, sx, FLOOR_Y + 10);
    gpGlow.addColorStop(0,   'rgba(255,180,80,0)');
    gpGlow.addColorStop(0.6, 'rgba(255,170,70,0.16)');
    gpGlow.addColorStop(1,   'rgba(255,140,40,0)');
    ctx.fillStyle = gpGlow;
    ctx.fillRect(dl - 10, doorTop, w + 20, FLOOR_Y - doorTop + 15);
    ctx.fillStyle = '#2c1e0c';
  } else {
    ctx.fillStyle = '#0e1428';
  }
  ctx.fillRect(dl, doorTop, w, h);

  ctx.strokeStyle = warm ? 'rgba(160,130,70,0.45)' : 'rgba(50,65,110,0.5)';
  ctx.lineWidth   = 1;
  ctx.strokeRect(dl, doorTop, w, h);

  // Inset panel lines (upper and lower recessed panels)
  const pi = 3;
  const ph = Math.floor(h * 0.38);
  ctx.strokeStyle = warm ? 'rgba(120,90,40,0.25)' : 'rgba(40,55,95,0.25)';
  ctx.strokeRect(dl + pi, doorTop + pi,          w - pi * 2, ph);
  ctx.strokeRect(dl + pi, doorTop + ph + pi * 2, w - pi * 2, h - ph - pi * 3);

  // Brass fittings
  drawBrassFitting(dl + Math.floor(w / 2), doorTop + Math.floor(h * 0.22), 'plaque');
  drawBrassFitting(dl + w - 4,             doorTop + Math.floor(h * 0.55), 'handle');
  drawBrassFitting(dl,                     doorTop + h - 4,                'kickplate', w);
}

/* ----------------------------------------------------------------
   ROOM / BACKGROUND
   Rooms use the shared primitive library above for structure
   (panels, baseboard, floor planks, doors, portholes, sconces),
   then add room-specific elements inline. Per-room palette tokens
   are what make each room distinct; the structure is shared.
   ---------------------------------------------------------------- */

function drawCabin(camX, now) {
  // UI zone base fill
  ctx.fillStyle = '#080e20';
  ctx.fillRect(0, 0, W, H);

  // Wall gradient — lifted cool blue; dim but legibly lit
  const wallGrad = ctx.createLinearGradient(0, 0, 0, FLOOR_Y);
  wallGrad.addColorStop(0,   '#1e2e54');
  wallGrad.addColorStop(0.5, '#2e3e72');
  wallGrad.addColorStop(1,   '#1e2e54');
  ctx.fillStyle = wallGrad;
  ctx.fillRect(0, 0, W, FLOOR_Y);

  // Ambient edge darkening
  const edgeGrad = ctx.createRadialGradient(
    W / 2, FLOOR_Y * 0.45, FLOOR_Y * 0.2,
    W / 2, FLOOR_Y * 0.45, H * 0.9
  );
  edgeGrad.addColorStop(0, 'rgba(0,0,0,0)');
  edgeGrad.addColorStop(1, 'rgba(12,6,24,0.55)');
  ctx.fillStyle = edgeGrad;
  ctx.fillRect(0, 0, W, FLOOR_Y);

  const baseboardH = 12;
  const baseboardY = FLOOR_Y - baseboardH;   // 168
  const panelTop   = 20;
  const panelH     = baseboardY - panelTop;  // 148

  // Riveted wall panels at half camera speed
  const panelSpacing = 120;
  const panelOffset  = (camX * 0.5) % panelSpacing;
  for (let px = -panelOffset; px < W + panelSpacing; px += panelSpacing) {
    drawShipPanel(Math.round(px), panelTop, panelSpacing, panelH, {
      strokeColor: 'rgba(55,75,130,0.22)',
      rivetColor:  'rgba(65,85,140,0.38)',
    });
  }

  /* ---- Left wall cap (game-world x=0) — cabin has ends, not hallway openness ---- */
  const leftWallSX = Math.round(0 - camX);
  if (leftWallSX < W) {
    const lwW = 36;
    // Wall cap: dark panel filling left end of playable area
    ctx.fillStyle = '#0a1228';
    ctx.fillRect(leftWallSX, panelTop, lwW, panelH + baseboardH);
    // Inner edge highlight to separate wall from room space
    ctx.fillStyle = 'rgba(80,100,170,0.25)';
    ctx.fillRect(leftWallSX + lwW - 2, panelTop, 2, panelH + baseboardH);
    // Rivet strip
    for (let ry = panelTop + 12; ry < baseboardY; ry += 20) {
      ctx.fillStyle = 'rgba(65,85,140,0.5)';
      ctx.beginPath();
      ctx.arc(leftWallSX + lwW - 8, ry, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  /* ---- Right wall cap (game-world x=ROOM_W) — closes the right end of the cabin ---- */
  const rightWallSX = Math.round(ROOM_W - camX);
  if (rightWallSX > 0) {
    const rwW = 48;
    ctx.fillStyle = '#0a1228';
    ctx.fillRect(rightWallSX - rwW, panelTop, rwW, panelH + baseboardH);
    ctx.fillStyle = 'rgba(80,100,170,0.25)';
    ctx.fillRect(rightWallSX - rwW, panelTop, 2, panelH + baseboardH);
    for (let ry = panelTop + 12; ry < baseboardY; ry += 20) {
      ctx.fillStyle = 'rgba(65,85,140,0.5)';
      ctx.beginPath();
      ctx.arc(rightWallSX - rwW + 8, ry, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    // Small brass ship plate on right wall — "CABIN 646"
    const plx = rightWallSX - rwW + 4, ply = panelTop + 18, plW = 40, plH = 12;
    ctx.fillStyle = 'rgba(120,90,30,0.7)';
    ctx.fillRect(plx - rwW + rwW, ply, plW, plH);  // recompute: plx is already correct
    ctx.fillStyle = 'rgba(120,90,30,0.7)';
    ctx.fillRect(rightWallSX - rwW + 4, ply, plW, plH);
    ctx.strokeStyle = 'rgba(180,140,50,0.55)';
    ctx.lineWidth = 1;
    ctx.strokeRect(rightWallSX - rwW + 4, ply, plW, plH);
  }

  // Porthole — game-world x=380 (the cabin's only window)
  const phSX = Math.round(380 - camX);
  if (phSX > -24 && phSX < W + 24) {
    drawPorthole(phSX, 58, 18, { moonlight: true, divider: true });
  }

  /* ---- Mirror — game-world x=280 (Sprint 11, on the wall opposite the bed) ---- */
  const mirrorGX = 280;
  const mirrorSX = Math.round(mirrorGX - camX);
  if (mirrorSX > -40 && mirrorSX < W + 40) {
    const mfW = 24, mfH = 32;   // frame outer dimensions
    const mfX = mirrorSX - mfW / 2;
    const mfY = baseboardY - mfH - 24;  // hanging on wall at eye height
    // Frame — dark wood/bronze
    ctx.fillStyle = '#3a2810';
    ctx.fillRect(mfX, mfY, mfW, mfH);
    ctx.strokeStyle = 'rgba(140,100,40,0.6)';
    ctx.lineWidth = 1;
    ctx.strokeRect(mfX, mfY, mfW, mfH);
    // Reflective surface (inner)
    const mInset = 3;
    const msX = mfX + mInset, msY = mfY + mInset, msW = mfW - mInset * 2, msH = mfH - mInset * 2;
    if (cabinState.mirrorRevealed) {
      // Post-cinematic: shows ghost-face (cool-white tint)
      ctx.fillStyle = '#8ab8d8';
      ctx.fillRect(msX, msY, msW, msH);
      // Tiny Pip ghost outline in the mirror
      ctx.fillStyle = 'rgba(240,248,255,0.9)';
      ctx.beginPath();
      ctx.arc(msX + msW / 2, msY + msH * 0.38, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(200,220,255,0.6)';
      ctx.fillRect(msX + msW / 2 - 3, msY + msH * 0.58, 6, 7);
    } else {
      // Default: dark reflective surface
      ctx.fillStyle = '#182038';
      ctx.fillRect(msX, msY, msW, msH);
      // Faint highlight sheen
      ctx.fillStyle = 'rgba(120,160,200,0.12)';
      ctx.fillRect(msX, msY, msW, 6);
    }
    // Mirror frame corner rivets
    const mRivets = [[mfX+2,mfY+2],[mfX+mfW-2,mfY+2],[mfX+2,mfY+mfH-2],[mfX+mfW-2,mfY+mfH-2]];
    for (const [rx,ry] of mRivets) {
      ctx.fillStyle = 'rgba(160,120,50,0.7)';
      ctx.beginPath(); ctx.arc(rx, ry, 1.5, 0, Math.PI * 2); ctx.fill();
    }
  }

  /* ---- Child's drawing on wall — Pip's identifying detail (game-world x=160) ---- */
  /* A small framed child's drawing — a boat at sea, crayoned bright, pinned to the wall panel.
     This is Pip's room specifically; Babcia packed it for him. */
  const drawingGX = 160;
  const drawingSX = Math.round(drawingGX - camX);
  if (drawingSX > -36 && drawingSX < W + 36) {
    const dwW = 20, dwH = 16;
    const dwX = drawingSX - dwW / 2;
    const dwY = baseboardY - dwH - 44;
    // Paper background (slightly yellowed)
    ctx.fillStyle = '#d8c898';
    ctx.fillRect(dwX, dwY, dwW, dwH);
    ctx.strokeStyle = 'rgba(100,80,40,0.5)';
    ctx.lineWidth = 1;
    ctx.strokeRect(dwX, dwY, dwW, dwH);
    // Sea — blue squiggle
    ctx.fillStyle = '#4870b8';
    ctx.fillRect(dwX + 1, dwY + dwH - 5, dwW - 2, 4);
    // Boat hull — orange-ish
    ctx.fillStyle = '#c86030';
    ctx.beginPath();
    ctx.moveTo(dwX + 4, dwY + dwH - 5);
    ctx.lineTo(dwX + 16, dwY + dwH - 5);
    ctx.lineTo(dwX + 14, dwY + dwH - 8);
    ctx.lineTo(dwX + 6, dwY + dwH - 8);
    ctx.closePath();
    ctx.fill();
    // Sail
    ctx.fillStyle = '#e8d8a8';
    ctx.beginPath();
    ctx.moveTo(dwX + 10, dwY + dwH - 8);
    ctx.lineTo(dwX + 10, dwY + 3);
    ctx.lineTo(dwX + 15, dwY + dwH - 8);
    ctx.closePath();
    ctx.fill();
    // Pushpin dot
    ctx.fillStyle = '#c83030';
    ctx.beginPath(); ctx.arc(dwX + dwW / 2, dwY + 1, 2, 0, Math.PI * 2); ctx.fill();
  }

  // Bed — game-world x=720 (bunk against right wall)
  const bedGX = 720, bedGW = 100, bedGH = 22, bedGY = FLOOR_Y - bedGH;
  const bedSX = Math.round(bedGX - camX);
  if (bedSX < W + bedGW && bedSX + bedGW > 0) {
    // Headboard
    ctx.fillStyle = '#2a2448';
    ctx.fillRect(bedSX + bedGW - 10, bedGY - 14, 10, bedGH + 14);
    ctx.strokeStyle = 'rgba(60,70,140,0.42)';
    ctx.lineWidth   = 1;
    ctx.strokeRect(bedSX + bedGW - 10, bedGY - 14, 10, bedGH + 14);
    // Bed frame
    ctx.fillStyle = '#1e2040';
    ctx.fillRect(bedSX, bedGY, bedGW, bedGH);
    ctx.strokeStyle = 'rgba(60,70,140,0.36)';
    ctx.strokeRect(bedSX, bedGY, bedGW, bedGH);
    // Bedding (rumpled, noticeably lighter than frame)
    ctx.fillStyle = '#363c66';
    ctx.fillRect(bedSX + 2, bedGY + 3, bedGW - 14, 10);
    ctx.fillStyle = '#404470';
    ctx.fillRect(bedSX + 6, bedGY + 3, 28, 8);

    // Lump-in-bed overlay (Sprint 10.7) — visible until Sprint 11 bed-reveal
    // A soft body-shaped bump under the covers. Implied, not detailed.
    if (!cabinState.bedRevealed) {
      const lumpX    = bedSX + 6;
      const lumpY    = bedGY + 1;
      const lumpW    = bedGW - 22;
      const lumpH    = 10;

      ctx.fillStyle   = 'rgba(20, 18, 48, 0.45)';
      ctx.beginPath();
      ctx.moveTo(lumpX, lumpY + lumpH);
      ctx.quadraticCurveTo(lumpX + lumpW * 0.3, lumpY - 2, lumpX + lumpW * 0.85, lumpY + 2);
      ctx.lineTo(lumpX + lumpW, lumpY + lumpH);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle   = 'rgba(50, 46, 88, 0.55)';
      ctx.beginPath();
      ctx.moveTo(lumpX, lumpY + lumpH);
      ctx.quadraticCurveTo(lumpX + lumpW * 0.15, lumpY - 4, lumpX + lumpW * 0.35, lumpY - 2);
      ctx.quadraticCurveTo(lumpX + lumpW * 0.55, lumpY - 3, lumpX + lumpW * 0.75, lumpY + 1);
      ctx.quadraticCurveTo(lumpX + lumpW * 0.90, lumpY + 3, lumpX + lumpW, lumpY + lumpH);
      ctx.closePath();
      ctx.fill();
    }
  }

  // Door — game-world x=120 (hallway door)
  const doorGX = 120;
  const doorSX = Math.round(doorGX - camX);
  const dw = 32, dh = 110, doorTop = baseboardY - dh;   // 168-110=58
  if (doorSX > -(dw + 6) && doorSX < W + (dw + 6)) {
    drawDoor(doorSX, doorTop, { w: dw, h: dh, warm: false });
  }

  // Floor surface
  const floorGrad = ctx.createLinearGradient(0, FLOOR_Y, 0, FLOOR_Y + 20);
  floorGrad.addColorStop(0, '#283858');
  floorGrad.addColorStop(1, '#080e20');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, FLOOR_Y, W, 20);

  drawFloorPlanks(camX, { lineColor: 'rgba(18,30,58,0.24)' });

  // Floor line
  ctx.strokeStyle = 'rgba(90,72,120,0.45)';
  ctx.lineWidth   = 1;
  ctx.beginPath(); ctx.moveTo(0, FLOOR_Y); ctx.lineTo(W, FLOOR_Y); ctx.stroke();

  drawBaseboard(0, baseboardY, W, {
    fillColor:   'rgba(20,32,58,0.68)',
    strokeColor: 'rgba(70,55,95,0.38)',
  });
}

/* ----------------------------------------------------------------
   SPARKLE INDICATORS
   Small warm-amber drifting dot that appears near an inspectable
   object when Pip is within range. Hidden while dialogue is open.
   ---------------------------------------------------------------- */

/* Object aura: always-on radial glow around interactable objects.
   Intensity scales from 0.15 (far) up to 1.0 as Pip enters 30px range.
   Sparkle particle appears only within 18px. */
function drawObjectAura(camX, now) {
  if (dialogue.active) return;
  for (const obj of rooms[currentRoom].objects) {
    const screenX  = Math.round(obj.x - camX);
    const distance = Math.abs(pip.x - obj.x);
    // Sprint 11: breadcrumb objects have elevated baseline + slow pulse (~3s cycle)
    const isBreadcrumb = !!(obj.breadcrumb);
    const baseline = isBreadcrumb
      ? 0.45 + Math.sin(now / 1000 * Math.PI / 1.5) * 0.15   // pulses 0.30 → 0.60
      : 0.15;
    const intensity = distance < 30 ? 1 - (distance / 30) : baseline;

    /* Radial gradient aura — always visible */
    const auraGrad = ctx.createRadialGradient(screenX, obj.sparkleY, 0, screenX, obj.sparkleY, 20);
    auraGrad.addColorStop(0, `rgba(255, 200, 104, ${(intensity * 0.35).toFixed(3)})`);
    auraGrad.addColorStop(1, 'rgba(255, 200, 104, 0)');
    ctx.fillStyle = auraGrad;
    ctx.beginPath();
    ctx.arc(screenX, obj.sparkleY, 20, 0, Math.PI * 2);
    ctx.fill();

    /* Sparkle particle — close proximity only */
    if (distance <= 18) {
      const drift = Math.sin(now / 1000) * 3;
      const pulse = 0.75 + Math.sin(now / 500) * 0.2;
      ctx.save();
      ctx.shadowColor = 'rgba(255, 200, 104, 0.9)';
      ctx.shadowBlur  = 12;
      ctx.globalAlpha = pulse;
      ctx.fillStyle   = '#ffc868'; /* --warm-pool-amber */
      ctx.beginPath();
      ctx.arc(screenX, obj.sparkleY + drift, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }
}

/* ----------------------------------------------------------------
   PIP SPRITE RIG
   Three-layer procedural placeholder. Layers drawn back-to-front:
   body → eyes → mouth. Each layer is driven by its own sub-state on
   `pip` and can be replaced with image draws independently when art
   is commissioned.

   All layer functions use LOCAL coordinates: (0, 0) = sprite center
   at foot level. The outer drawPip() sets up the canvas transform
   (translate to anchor, flip if facing left) before calling the
   three layer functions, then restores.

   See 05-tech-architecture.md §Sprite Rig and
       03-art-and-aesthetic.md §Sprite-rig layering + §Sprite direction
   ---------------------------------------------------------------- */

function drawPip(screenX, groundY, now) {
  /* Idle bob: ±2px vertical sine wave at ~600ms period */
  const bob = Math.sin(now / 600) * 2;
  const cx   = Math.round(screenX);
  const foot = Math.round(groundY + bob);

  ctx.save();

  /* ---- Set up local coordinate system ----
     Translate so that (0,0) is the sprite's horizontal center at foot
     level. If facing left, mirror horizontally around that anchor.
     All three layer functions draw in this local space — no manual
     left/right coordinate adjustments needed inside them. */
  ctx.translate(cx, foot);
  if (pip.body.facing === 'left') ctx.scale(-1, 1);

  /* Sprint 13: squat animation — compress body vertically while squatTimer > 0 */
  if (pip.squatTimer > 0) {
    const squatFrac = pip.squatTimer / SQUAT_DURATION; // 1→0
    const squatAmount = Math.sin(squatFrac * Math.PI); // 0→1→0
    const scaleY = 1.0 - squatAmount * 0.25;           // squeeze to 75% at peak
    ctx.scale(1, scaleY);
  }

  drawPipBody();
  drawPipEyes();
  drawPipMouth();

  ctx.restore();
}

/* ---- Layer 1: Body ----
   Ghost silhouette, apron, and underglow. Local coords: (0,0) = center/foot.
   The wavy bottom has three downward bumps (classic ghost shape).
   See 03-art-and-aesthetic.md §Pip Sprite Specification. */

function drawPipBody() {
  const topY    = -PIP_H;       /* −40: top of sprite                   */
  const headCY  = topY + 12;   /* −28: centre of head arc               */
  const bodyBot = -10;          /* straight body ends 10px above foot    */

  /* Ghost body glow */
  ctx.shadowColor = 'rgba(240, 248, 255, 0.85)';
  ctx.shadowBlur  = 12;
  ctx.globalAlpha = 0.85;

  /* Ghost body fill */
  ctx.fillStyle = '#dce8ff';
  ctx.beginPath();

  /* Head: semicircle from left arc-start (−12, headCY) up and over to (12, headCY) */
  ctx.arc(0, headCY, 12, Math.PI, 0);

  /* Right wall down to where bumps begin */
  ctx.lineTo(12, bodyBot);

  /* Three downward bumps (right → left). Each bump spans ~8px. */
  ctx.quadraticCurveTo( 8, 0,  4, bodyBot);
  ctx.quadraticCurveTo( 0, 0, -4, bodyBot);
  ctx.quadraticCurveTo(-8, 0, -12, bodyBot);

  ctx.closePath();
  ctx.fill();

  ctx.shadowBlur = 0;

  /* Apron — faint horizontal band. Pip always wears the oversized
     chef's apron Babcia gave him. */
  ctx.globalAlpha = 0.28;
  ctx.fillStyle   = '#d4c89a';
  ctx.fillRect(-8, topY + 23, 17, 8);
  ctx.fillStyle = '#b8a87a';
  ctx.fillRect(-2, topY + 22,  3, 3);

  /* Cool underglow beneath Pip */
  ctx.globalAlpha = 0.12;
  const glowGrad = ctx.createRadialGradient(0, 2, 0, 0, 2, 17);
  glowGrad.addColorStop(0, '#c0d8ff');
  glowGrad.addColorStop(1, 'rgba(180, 210, 255, 0)');
  ctx.fillStyle = glowGrad;
  ctx.beginPath();
  ctx.ellipse(0, 2, 17, 5, 0, 0, Math.PI * 2);
  ctx.fill();
}

/* ---- Layer 2: Eyes ----
   Two dark eye-dots driven by pip.eyes state. Blinks animate
   openness 1→0→1 via updateBlink(). The flip applied by drawPip()
   means left/right eye positions stay the same in local coords in
   both facing directions — no manual swap needed. */

function drawPipEyes() {
  const headCY = -PIP_H + 12;   /* −28 */
  const e      = pip.eyes;

  /* Eye height driven by openness; minimum 1px so they're never invisible */
  const eyeH = Math.max(1, Math.round(5 * e.openness));

  const offX = Math.round(e.offsetX);
  const offY = Math.round(e.offsetY);

  ctx.globalAlpha = 0.92;
  ctx.fillStyle   = '#1a1428';
  ctx.fillRect(-5 + offX, headCY - 2 + offY, 3, eyeH);   /* left eye  */
  ctx.fillRect( 3 + offX, headCY - 2 + offY, 3, eyeH);   /* right eye */

  /* Subtle blush */
  ctx.globalAlpha = 0.18;
  ctx.fillStyle   = '#e8a0a0';
  ctx.fillRect(-8, headCY + 3, 5, 3);
  ctx.fillRect( 4, headCY + 3, 5, 3);
}

/* ---- Layer 3: Mouth ----
   Ships as a single neutral pixel. 'shape' and 'openness' in
   pip.mouth are reserved for future emotional expressions (small
   smile, gasp) driven by story beats. The rig is in place; future
   sprints add those shapes without re-architecting. */

function drawPipMouth() {
  const headCY = -PIP_H + 12;   /* −28 */
  const m      = pip.mouth;

  ctx.globalAlpha = 0.65;
  ctx.fillStyle   = '#1a1428';
  /* Neutral: 2×2 dot centered just below mid-face */
  ctx.fillRect(Math.round(m.offsetX), headCY + 8 + Math.round(m.offsetY), 2, 2);
}

/* ================================================================
   ROOM TRANSITION
   Fade-out / black hold / fade-in over ~600ms total.
   startTransition(toRoom, entryEdge) — entryEdge: 'fromLeft'|'fromRight'
   ================================================================ */

/* Optional entryX overrides the default pipEntryX lookup — used when
   Pip must land at a specific game-world coordinate (e.g. grandparents → hallway
   exit at x≈1164, next to the door he just stepped out of). */
function startTransition(toRoom, entryEdge, entryX) {
  if (transition.active) return;
  transition.active = true;

  // If leaving the hallway while passenger is still walking, cancel him
  if (currentRoom === 'hallway' && passenger.active) {
    passenger.active = false;
    passenger.aftermathPending = false;
  }

  const overlay = document.getElementById('room-transition');
  overlay.style.opacity = '1';  // fade to black — 200ms CSS transition

  setTimeout(() => {
    // Screen is black — swap room, reposition Pip
    currentRoom = toRoom;
    playMusic(ROOM_MUSIC[currentRoom] || 'main');
    pip.x = entryX !== undefined
      ? entryX
      : entryEdge === 'fromLeft'
        ? rooms[toRoom].pipEntryX.fromLeft
        : rooms[toRoom].pipEntryX.fromRight;
    pip.body.facing = entryEdge === 'fromLeft' ? 'right' : 'left';

    // Land Pip on floor on room change (don't carry float state across)
    pip.float.altitude = 0;
    pip.float.vy       = 0;

    // First hallway entry: arm the passenger timer
    if (toRoom === 'hallway' && !passenger.hallwayEntered) {
      passenger.hallwayEntered  = true;
      passenger.firstEntryTimer = 1.5;
    }

    setRoomStrip();

    // 200ms black hold, then fade in
    setTimeout(() => {
      overlay.style.opacity = '0';  // fade from black — 200ms CSS transition

      setTimeout(() => {
        transition.active = false;
      }, 200);  // wait for fade-out transition to complete
    }, 200);  // hold duration
  }, 200);  // wait for fade-in to complete before swapping
}

/* ================================================================
   PASSENGER NPC UPDATE
   ================================================================ */

function updatePassenger(dt) {
  if (currentRoom !== 'hallway') return;

  // Count down the first-entry spawn timer.
  // Sprint 10.7: gate passenger spawn on opening sequence being complete.
  if (!passenger.triggered && passenger.hallwayEntered && passenger.firstEntryTimer > 0
      && openingSeq.state === 'complete') {
    passenger.firstEntryTimer -= dt;
    if (passenger.firstEntryTimer <= 0) {
      // Spawn just off the right edge of the visible canvas
      passenger.active    = true;
      passenger.triggered = true;
      passenger.x         = getCameraX() + W + 20;
    }
  }

  // Walk left
  if (passenger.active) {
    passenger.x -= passenger.speed * dt;
    if (passenger.x < -40) {
      passenger.active          = false;
      passenger.aftermathPending = true;
    }
  }

  // Fire aftermath dialogue once he exits and no dialogue is already active
  if (passenger.aftermathPending && !dialogue.active && !dialogue.closing) {
    passenger.aftermathPending = false;
    showDialogue({
      id: 'passenger-aftermath',
      lines: [{ speaker: 'PIP', text: '\u2026they didn\u2019t see me.', italic: false }],
      choices: null,
      onEnd: null,
    });
  }
}

/* ================================================================
   CINEMATIC ENGINE
   showCinematic(name, onEnd) — activates a named cinematic.
   skipCinematic()            — ESC: instant-close dialogue, run fade.
   startCinematicFadeOut()    — 600ms fade-to-black then call onEnd.
   drawCinematicScene(name)   — dispatches to per-scene draw function.
   ================================================================ */

const CINEMATIC_SCRIPTS = {
  grandparents: [
    { speaker: null,  text: 'Babcia is on the bed with her head in her hands. She is making a sound Pip has never heard her make. She is sobbing.', italic: false },
    { speaker: 'PIP', text: '\u201cBabcia, what\u2019s wrong?\u201d', italic: false },
    { speaker: null,  text: 'Dziadek stands at the window. His shoulders are shaking. He says nothing. Tears stream down his face.', italic: false },
    { speaker: null,  text: 'On the nightstand sits a photograph. It shows Pip on his sixth birthday, holding a pierogi as big as his face.', italic: false },
    { speaker: 'PIP', text: '\u201cBabcia? \u2026 Dziadek?\u201d', italic: false },
    { speaker: null,  text: 'They do not look up.', italic: false },
    { speaker: 'PIP', text: '\u201cHello! I\u2019m here. I\u2019m right here. What\u2019s wrong?\u201d', italic: false },
    { speaker: null,  text: 'Pip\u2019s stomach turns.', italic: false },
    { speaker: null,  text: 'They continue to cry.', italic: false },
    { speaker: null,  text: 'Dziadek turns. For a moment, just a moment, he looks toward the doorway. He frowns. He shakes his head and turns back to the window.', italic: false },
    { speaker: 'PIP', text: '\u201cDziadek\u2026\u201d', italic: false },
    { speaker: null,  text: 'Pip tries. But Dziadek does not hear him.', italic: false },
  ],

  /* Sprint 11: mirror-realization cinematic.
     Present-tense (isMemory = false). Pip sees his ghost-face in the mirror.
     Melt animation happens in drawMirrorCinematic(); dialogue follows. */
  'mirror-realization': [
    { speaker: null,  text: 'Pip looks. Pip looks again. The boy in the mirror is not the boy who walked in.', italic: false },
    { speaker: null,  text: 'I\u2019m not me.', italic: true },
  ],

  /* Sprint 11: bed-reveal cinematic.
     Present-tense (isMemory = false). Sheets pull back; small still form. */
  'bed-reveal': [
    { speaker: null,  text: 'The boy in the bed does not move.', italic: false },
    { speaker: null,  text: 'Oh.', italic: true },
  ],
};

function showCinematic(name, onEnd) {
  if (cinematic.played.has(name)) {
    if (onEnd) onEnd();
    return;
  }

  cinematic.active    = true;
  cinematic.name      = name;
  cinematic.holdTimer = 0;
  cinematic.fadingOut = false;
  cinematic.onEnd     = onEnd || null;
  cinematic.isMemory  = false;   // Sprint 11: present-tense by default; set true for memory cinematics
  cinematic.played.add(name);

  // Sprint 13: hide HUD during cinematics
  hideHUD();

  // Sprint 11: reset per-cinematic draw timers
  if (name === 'mirror-realization') {
    mirrorCinState.elapsed = 0;
    mirrorCinState.lastNow = null;
  } else if (name === 'bed-reveal') {
    bedRevealCinState.elapsed = 0;
    bedRevealCinState.lastNow = null;
  }

  showDialogue({
    id:      'cinematic-' + name,
    lines:   CINEMATIC_SCRIPTS[name],
    choices: null,
    onEnd() {
      // Final line dismissed — begin 1.2s silence before fade-out
      cinematic.holdTimer = 1.2;
    },
  });
  // Override the 'atmospheric-dialogue' strip that showDialogue just set
  setControlsStrip('cinematic');
}

function skipCinematic() {
  if (!cinematic.active) return;

  // Force-close dialogue immediately (no 300ms fade delay)
  if (dialogue.active || dialogue.closing) {
    document.getElementById('dialogue-box').classList.remove('active');
    dialogue.active  = false;
    dialogue.closing = false;
    dialogue.node    = null;
    const choicesEl = document.getElementById('dialogue-choices');
    choicesEl.innerHTML = '';
    choicesEl.classList.remove('visible');
    choicesEl.style.display = 'none';
  }

  cinematic.holdTimer = 0;
  startCinematicFadeOut();
}

function startCinematicFadeOut() {
  if (cinematic.fadingOut) return;
  cinematic.fadingOut = true;

  const overlay = document.getElementById('room-transition');
  overlay.style.transition = 'opacity 0.6s ease';
  overlay.style.opacity    = '1';

  setTimeout(() => {
    const onEnd = cinematic.onEnd;
    cinematic.active    = false;
    cinematic.fadingOut = false;
    cinematic.name      = null;
    cinematic.onEnd     = null;

    // Restore overlay to standard room-transition speed
    overlay.style.transition = 'opacity 0.2s ease';
    overlay.style.opacity    = '0';

    // Sprint 13: restore HUD after cinematic ends (if opening sequence already done)
    if (openingSeq.state === 'complete') showHUD();

    if (onEnd) onEnd();
  }, 600);
}

function drawCinematicScene(name, now) {
  if (name === 'grandparents')        drawGrandparentsCinematic(now);
  else if (name === 'mirror-realization') drawMirrorCinematic(now);
  else if (name === 'bed-reveal')     drawBedRevealCinematic(now);
  // Sprint 11: memory mist opt-in — drawn on top of scene, below dialogue overlay
  if (cinematic.isMemory) drawMemoryMist(now);
}

/* ----------------------------------------------------------------
   GRANDPARENTS CINEMATIC SCENE
   Wide painterly shot of the small cabin interior. Five compositional
   elements: window+Dziadek (left third), suitcase (mid-frame lower),
   bed+Babcia (right third), bedside lamp (far right), nightstand+photo.
   Warm dim base — the warmest scene in the chapter.
   Procedural placeholder (Register B art to replace later).
   ---------------------------------------------------------------- */

function drawGrandparentsCinematic(now) {
  // Base fill — lifted
  ctx.fillStyle = '#201408';   // lifted from #100c04
  ctx.fillRect(0, 0, W, H);

  const wallGrad = ctx.createLinearGradient(0, 0, 0, FLOOR_Y);
  wallGrad.addColorStop(0,   '#3a2818');   // lifted from #221608
  wallGrad.addColorStop(0.7, '#2e2010');   // lifted from #1a1208
  wallGrad.addColorStop(1,   '#241808');   // lifted from #141008
  ctx.fillStyle = wallGrad;
  ctx.fillRect(0, 0, W, FLOOR_Y);

  // Lamp warm glow pool — expanded radius (145 → 180); lampX=464
  const lampGlow = ctx.createRadialGradient(464, 88, 0, 464, 88, 180);

  ctx.fillRect(0, 0, W, FLOOR_Y);

  // Floor band — lifted

  floorGrad.addColorStop(0, '#382a18');   // lifted from #241a0c
  floorGrad.addColorStop(1, '#201408');

  ctx.fillRect(0, FLOOR_Y, W, 20);

  ctx.strokeStyle = 'rgba(90,65,28,0.55)';
  ctx.lineWidth   = 1;
  ctx.beginPath(); ctx.moveTo(0, FLOOR_Y); ctx.lineTo(W, FLOOR_Y); ctx.stroke();

  // === Element 1: Window (left third) ===

  ctx.fillStyle = '#1a2840';
  ctx.fillRect(winX, winY, winW, winH);
  // Panes

  ctx.lineWidth   = 1;
  ctx.beginPath(); ctx.moveTo(winX + winW / 2, winY); ctx.lineTo(winX + winW / 2, winY + winH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(winX, winY + winH * 0.5); ctx.lineTo(winX + winW, winY + winH * 0.5); ctx.stroke();
  // Frame — drawShipPanel border (rivets:false) then thick wood frame on top

  ctx.strokeRect(winX - 2, winY - 2, winW + 4, winH + 4);
  ctx.lineWidth   = 1;
  // Moonlight

  const scX = 185, scW = 68, scH = 16, scY = FLOOR_Y - scH;

  ctx.beginPath();

  ctx.lineTo(scX + scW,  scY);

  // === Element 3: Bed (right third) ===

  const bedX = 284, bedW = 144, bedH = 24, bedY = FLOOR_Y - bedH;
  // Headboard

  ctx.fillStyle = '#685030';   // lifted from #4a3418
  ctx.fillRect(bedX + 6,  bedY + 2, 24, 7);
  ctx.fillRect(bedX + 48, bedY + 3, 18, 6);
  ctx.fillStyle = '#4e3822';   // lifted from #382616

  // === Element 4: Bedside lamp (far right) ===
  const lampX = 464, lampShadeY = 78;
  const pulse = 0.85 + Math.sin(now / 2800) * 0.08;
  ctx.fillStyle = '#5a4828';   // lifted stem
  ctx.fillRect(lampX - 1, lampShadeY + 18, 3, FLOOR_Y - lampShadeY - 18);

  ctx.lineTo(lampX - 6,  lampShadeY);
  ctx.closePath();

  lampHalo.addColorStop(0, `rgba(255,210,90,${0.26 * pulse})`);

  // === Babcia seated on bed (sob-bob) ===
  const babciaSob = Math.sin(now / 1500) * 1;
  drawCinBabcia(Math.round(bedX + bedW * 0.38), bedY + Math.round(babciaSob));

/* Babcia in cinematic — hunched-seated figure, slightly more detail */
