/* Subtle dust motes drifting in the lamp's light cone */
function drawDustMotes(now) {
  const MOTES = [
    { ox: 422, oy:  82, freq: 0.00041, phase: 0.0 },
    { ox: 440, oy: 102, freq: 0.00037, phase: 1.2 },
    { ox: 460, oy: 122, freq: 0.00044, phase: 2.5 },
    { ox: 432, oy:  62, freq: 0.00039, phase: 3.8 },
    { ox: 412, oy: 112, freq: 0.00042, phase: 0.7 },
    { ox: 448, oy: 142, freq: 0.00036, phase: 1.9 },
  ];
  ctx.save();
  ctx.fillStyle = 'rgba(255,220,140,1)';
  for (const m of MOTES) {
    const x     = m.ox + Math.sin(now * m.freq + m.phase) * 8;
    const y     = m.oy + Math.cos(now * m.freq * 0.7 + m.phase) * 5;
    const alpha = 0.28 + Math.sin(now * m.freq * 1.3 + m.phase) * 0.14;
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(x, y, 1, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

/* ----------------------------------------------------------------
   MIRROR REALIZATION CINEMATIC  (Sprint 11)
   Close-up of Pip looking into the mirror. His face melts downward
   over ~2s (pixel-distortion approach), then resolves as ghost-face.
   Dialogue lines follow in the standard cinematic overlay.
   Present-tense — no memory mist.
   ---------------------------------------------------------------- */

/* Per-session timer that advances during the mirror cinematic frame render.
   Reset in showCinematic; purely visual, no gameplay consequences. */
const mirrorCinState = {
  elapsed: 0,    // seconds since cinematic started, tracked in draw
  lastNow: null, // previous timestamp (ms) for delta calc
};

function drawMirrorCinematic(now) {
  // Advance internal timer using real time delta
  if (mirrorCinState.lastNow !== null) {
    mirrorCinState.elapsed += (now - mirrorCinState.lastNow) / 1000;
  }
  mirrorCinState.lastNow = now;

  const HOLD_T  = 1.5;   // seconds showing face before melt
  const MELT_T  = 2.0;   // melt duration
  const elapsed = mirrorCinState.elapsed;

  // Dark base
  ctx.fillStyle = '#06080e';
  ctx.fillRect(0, 0, W, H);

  // Warm ambient — slight ember glow from offscreen lamp
  const ambGrad = ctx.createRadialGradient(W * 0.85, H * 0.6, 0, W * 0.85, H * 0.6, W * 0.55);
  ambGrad.addColorStop(0, 'rgba(90,50,10,0.35)');
  ambGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = ambGrad;
  ctx.fillRect(0, 0, W, H);

  // ---- Mirror frame (cinematic close-up — fills most of canvas) ----
  const mfW = 140, mfH = 190;
  const mfX = (W - mfW) / 2;
  const mfY = (H - mfH) / 2 - 8;
  ctx.fillStyle = '#2e1e0a';
  ctx.fillRect(mfX, mfY, mfW, mfH);
  ctx.strokeStyle = 'rgba(160,110,40,0.7)';
  ctx.lineWidth = 2;
  ctx.strokeRect(mfX, mfY, mfW, mfH);

  const inset = 8;
  const msX = mfX + inset, msY = mfY + inset, msW = mfW - inset * 2, msH = mfH - inset * 2;

  // ---- Reflective surface ----
  // Draw a temporary offscreen-style composite using main canvas save/clip

  ctx.save();
  ctx.beginPath();
  ctx.rect(msX, msY, msW, msH);
  ctx.clip();

  // Melt progress: 0 during hold, 0→1 during melt
  const meltT = Math.max(0, Math.min(1, (elapsed - HOLD_T) / MELT_T));

  // --- Human face (drawn using simple pixel-block face, then shifted downward) ---
  const faceCX = msX + msW / 2;
  const faceCY = msY + msH * 0.38;
  const humanShift = meltT * msH * 0.55;   // pixels face drips downward

  if (meltT < 1) {
    const fAlpha = 1 - meltT * 0.85;  // face fades as it melts
    ctx.globalAlpha = fAlpha;

    // Face background fill (flesh-like neutral tone for human Pip)
    ctx.fillStyle = '#d8b888';
    ctx.beginPath();
    ctx.ellipse(faceCX, faceCY + humanShift * 0.6, 28, 34, 0, 0, Math.PI * 2);
    ctx.fill();

    // Eyes (drip slightly faster)
    const eyeShift = humanShift * 1.1;
    ctx.fillStyle = '#3a2818';
    ctx.beginPath(); ctx.ellipse(faceCX - 8, faceCY - 6 + eyeShift, 4, 3.5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(faceCX + 8, faceCY - 6 + eyeShift, 4, 3.5, 0, 0, Math.PI * 2); ctx.fill();
    // Eye glint
    ctx.fillStyle = '#f0f0f0';
    ctx.beginPath(); ctx.arc(faceCX - 7, faceCY - 7 + eyeShift, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(faceCX + 9, faceCY - 7 + eyeShift, 1.5, 0, Math.PI * 2); ctx.fill();

    // Nose (drips faster than eyes)
    const noseShift = humanShift * 1.25;
    ctx.fillStyle = '#c09060';
    ctx.beginPath();
    ctx.moveTo(faceCX, faceCY + noseShift);
    ctx.lineTo(faceCX - 4, faceCY + 8 + noseShift);
    ctx.lineTo(faceCX + 4, faceCY + 8 + noseShift);
    ctx.closePath();
    ctx.fill();

    // Mouth (drips fastest — jaw drips)
    const mouthShift = humanShift * 1.4;
    ctx.fillStyle = '#b07048';
    ctx.beginPath();
    ctx.ellipse(faceCX, faceCY + 14 + mouthShift, 8, 3, 0, 0, Math.PI);
    ctx.fill();

    // Drip streaks during melt — vertical liquid strands
    if (meltT > 0.1) {
      ctx.globalAlpha = fAlpha * meltT * 0.7;
      ctx.strokeStyle = '#d8b888';
      ctx.lineWidth = 1.5;
      const dripSeeds = [faceCX - 12, faceCX - 4, faceCX + 2, faceCX + 10, faceCX + 18];
      for (let d = 0; d < dripSeeds.length; d++) {
        const dripLen = meltT * msH * 0.45 * (0.6 + (d % 3) * 0.2);
        ctx.beginPath();
        ctx.moveTo(dripSeeds[d], faceCY + 18);
        ctx.lineTo(dripSeeds[d] + (d % 2 === 0 ? 1 : -1), faceCY + 18 + dripLen);
        ctx.stroke();
      }
    }

    ctx.globalAlpha = 1;
  }

  // --- Ghost face resolves as melt progresses ---
  if (meltT > 0.3) {
    const ghostAlpha = Math.min(1, (meltT - 0.3) / 0.7);
    ctx.globalAlpha = ghostAlpha;
    // Ghost-face: cool white, same design as Pip's sprite but scaled up
    ctx.fillStyle = '#dce8f8';   // spirit-pip cool white
    ctx.beginPath();
    ctx.arc(faceCX, faceCY, 26, Math.PI, 0);  // head arc top
    // Wavy ghost bottom (3 bumps)
    const ghostBase = faceCY + 26;
    const bumpW = 17;
    ctx.lineTo(faceCX + 26, ghostBase);
    ctx.quadraticCurveTo(faceCX + 26 - bumpW * 0.25, ghostBase + 10, faceCX + 26 - bumpW * 0.5, ghostBase);
    ctx.quadraticCurveTo(faceCX + 26 - bumpW * 0.75, ghostBase + 10, faceCX + 26 - bumpW, ghostBase);
    ctx.quadraticCurveTo(faceCX + 26 - bumpW * 1.25, ghostBase + 10, faceCX + 26 - bumpW * 1.5, ghostBase);
    ctx.lineTo(faceCX - 26, ghostBase);
    ctx.closePath();
    ctx.fill();
    // Ghost eyes — large, cool-tinted
    const bEyeOpenness = 1.0;
    ctx.fillStyle = '#0a1828';
    const eyeH = 5 * bEyeOpenness;
    ctx.beginPath(); ctx.ellipse(faceCX - 8, faceCY - 6, 4.5, eyeH, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(faceCX + 8, faceCY - 6, 4.5, eyeH, 0, 0, Math.PI * 2); ctx.fill();
    // Eye glow
    ctx.fillStyle = 'rgba(200,228,255,0.55)';
    ctx.beginPath(); ctx.arc(faceCX - 7, faceCY - 7, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(faceCX + 9, faceCY - 7, 2, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Mirror surface background — cool dark tint
  if (meltT < 0.3) {
    ctx.fillStyle = '#0e1830';
    ctx.globalAlpha = 0.6;
    ctx.fillRect(msX, msY, msW, msH);
    ctx.globalAlpha = 1;
  }

  ctx.restore();   // unclip

  // Mirror frame corners
  const cornerR = 4;
  for (const [cx, cy] of [[mfX, mfY],[mfX+mfW, mfY],[mfX, mfY+mfH],[mfX+mfW, mfY+mfH]]) {
    ctx.fillStyle = 'rgba(180,130,50,0.8)';
    ctx.beginPath(); ctx.arc(cx, cy, cornerR, 0, Math.PI * 2); ctx.fill();
  }

  // Ambient glow from mirror — cool spirit light spilling into room
  const glowAlpha = meltT > 0.3 ? 0.12 + (meltT - 0.3) * 0.18 : 0.06;
  const mirrorGlow = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, mfW * 0.9);
  mirrorGlow.addColorStop(0, `rgba(160,200,255,${glowAlpha})`);
  mirrorGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = mirrorGlow;
  ctx.fillRect(0, 0, W, H);

  // Subtle trembling during hold phase
  if (elapsed < HOLD_T && elapsed > 0.3) {
    const tremble = (Math.sin(now * 0.023) + Math.sin(now * 0.037)) * 0.5;
    const tAlpha = 0.04 + Math.abs(tremble) * 0.04;
    ctx.fillStyle = `rgba(240,248,255,${tAlpha.toFixed(3)})`;
    ctx.fillRect(0, 0, W, H);
  }
}

/* ----------------------------------------------------------------
   BED REVEAL CINEMATIC  (Sprint 11)
   Close-up on the bed. Sheets pull back over ~0.6s. Small still form.
   Face turned away. Body implied, not detailed.
   Present-tense — no memory mist.
   ---------------------------------------------------------------- */

const bedRevealCinState = {
  elapsed: 0,
  lastNow: null,
};

function drawBedRevealCinematic(now) {
  if (bedRevealCinState.lastNow !== null) {
    bedRevealCinState.elapsed += (now - bedRevealCinState.lastNow) / 1000;
  }
  bedRevealCinState.lastNow = now;

  const SHEET_T = 0.6;   // sheet pull duration
  const sheetT  = Math.min(1, bedRevealCinState.elapsed / SHEET_T);

  // Dark base
  ctx.fillStyle = '#06080e';
  ctx.fillRect(0, 0, W, H);

  // Ambient warmth — faint glow (same porthole light that exists in gameplay)
  const ambGrad = ctx.createRadialGradient(W * 0.3, H * 0.25, 0, W * 0.3, H * 0.25, W * 0.45);
  ambGrad.addColorStop(0, 'rgba(30,50,100,0.25)');
  ambGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = ambGrad;
  ctx.fillRect(0, 0, W, H);

  // ---- Bed close-up ----
  const bW = 260, bH = 70;
  const bX = (W - bW) / 2, bY = H / 2 - bH * 0.4;

  // Headboard (right side)
  ctx.fillStyle = '#1a1830';
  ctx.fillRect(bX + bW - 16, bY - 24, 16, bH + 24);
  ctx.strokeStyle = 'rgba(60,70,140,0.5)';
  ctx.lineWidth = 1;
  ctx.strokeRect(bX + bW - 16, bY - 24, 16, bH + 24);

  // Bed frame
  ctx.fillStyle = '#141028';
  ctx.fillRect(bX, bY, bW, bH);
  ctx.strokeStyle = 'rgba(50,60,120,0.5)';
  ctx.strokeRect(bX, bY, bW, bH);

  // ---- Body underneath — small still form ----
  // Face is turned away (toward headboard/right). Body implied not detailed.
  const bodyX = bX + bW * 0.3, bodyY = bY + 12;
  const bodyW  = bW * 0.6,     bodyH  = bH - 22;
  // Hair (soft brown, visible)
  ctx.fillStyle = '#6a4820';
  ctx.beginPath();
  ctx.ellipse(bX + bW * 0.82, bodyY + 8, 14, 10, 0, 0, Math.PI * 2);
  ctx.fill();
  // Body shape — pale, slight, curved like a sleeping child
  ctx.fillStyle = '#c8c0d8';
  ctx.globalAlpha = 0.65;
  ctx.beginPath();
  ctx.moveTo(bodyX, bodyY + bodyH);
  ctx.quadraticCurveTo(bodyX + bodyW * 0.2, bodyY + 4, bodyX + bodyW * 0.55, bodyY + 6);
  ctx.quadraticCurveTo(bodyX + bodyW * 0.75, bodyY + 3, bodyX + bodyW, bodyY + 8);
  ctx.lineTo(bodyX + bodyW, bodyY + bodyH);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1;

  // ---- Sheets ----
  // Full sheet starts at bX, bY+4 covering entire bed width
  // As sheetT progresses: sheet foot-end (bX side) pulls back, revealing body
  const sheetsRemainW = bW * (1 - sheetT * 0.72);  // how much of bed is still covered (from foot end)
  const sheetX = bX + (bW - sheetsRemainW);         // sheet starts further right as it pulls back

  // Under-sheet remnant at foot (slight fold visible)
  if (sheetT < 1) {
    ctx.fillStyle = '#2a2c50';
    ctx.fillRect(bX, bY + 4, sheetX - bX + 8, bH - 6);  // foot-end residual
  }

  // Main sheet (pulled back toward foot)
  ctx.fillStyle = '#363c66';
  ctx.fillRect(sheetX, bY + 4, sheetsRemainW, bH - 6);
  // Sheet highlight / wrinkles
  ctx.fillStyle = '#404470';
  ctx.fillRect(sheetX + 4, bY + 5, Math.min(sheetsRemainW - 8, 48), 7);
  ctx.fillStyle = '#2e3258';
  ctx.fillRect(sheetX + sheetsRemainW - 16, bY + 4, 16, bH - 8);  // fold at free edge

  // Pillow (always visible at head end)
  ctx.fillStyle = '#4a4870';
  ctx.fillRect(bX + bW - 70, bY + 4, 52, 20);
  ctx.strokeStyle = 'rgba(80,80,120,0.5)';
  ctx.strokeRect(bX + bW - 70, bY + 4, 52, 20);

  // ---- Vignette — focus attention on the bed ----
  const vig = ctx.createRadialGradient(W / 2, H / 2, H * 0.18, W / 2, H / 2, H * 0.65);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(4,4,16,0.7)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
}

/* ----------------------------------------------------------------
   MEMORY MIST  (Sprint 11)
   Soft white/blue mist drifts inward from the four canvas edges.
   Rendered when cinematic.isMemory === true, after the scene draw,
   before the dialogue overlay.
   Not used by any cinematic in Sprint 11 — defined for Sprint 12+.
   ---------------------------------------------------------------- */

function drawMemoryMist(now) {
  const edges = [
    { axis: 'top',    x0: 0,   y0: 0,       x1: 0,   y1: H * 0.45,   w: W, h: H * 0.45, phase: 0.0  },
    { axis: 'bottom', x0: 0,   y0: H,        x1: 0,   y1: H * 0.55,   w: W, h: H * 0.45, phase: 1.5  },
    { axis: 'left',   x0: 0,   y0: 0,        x1: W*0.4,y1: 0,         w: W*0.4, h: H,    phase: 3.0  },
    { axis: 'right',  x0: W,   y0: 0,        x1: W*0.6,y1: 0,         w: W*0.4, h: H,    phase: 4.5  },
  ];

  for (const e of edges) {
    const sway = Math.sin((now / 6000) * Math.PI * 2 + e.phase) * 8;  // ±8px on ~6s cycle

    let g;
    if (e.axis === 'top') {
      g = ctx.createLinearGradient(0, 0, 0, H * 0.45 + sway);
      g.addColorStop(0, 'rgba(220,230,255,0.18)');
      g.addColorStop(1, 'rgba(220,230,255,0)');
    } else if (e.axis === 'bottom') {
      g = ctx.createLinearGradient(0, H, 0, H * 0.55 + sway);
      g.addColorStop(0, 'rgba(220,230,255,0.18)');
      g.addColorStop(1, 'rgba(220,230,255,0)');
    } else if (e.axis === 'left') {
      g = ctx.createLinearGradient(0, 0, W * 0.4 + sway, 0);
      g.addColorStop(0, 'rgba(220,230,255,0.15)');
      g.addColorStop(1, 'rgba(220,230,255,0)');
    } else {
      g = ctx.createLinearGradient(W, 0, W * 0.6 + sway, 0);
      g.addColorStop(0, 'rgba(220,230,255,0.15)');
      g.addColorStop(1, 'rgba(220,230,255,0)');
    }

    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }
}

/* ================================================================
   HALLWAY BACKGROUND
   Ship corridor — 1440px wide. Doors, sconces, red carpet tint,
   far-right dark zone. Same palette family as the cabin.
   ================================================================ */

function drawHallway(camX, now) {
  // Base fill
  ctx.fillStyle = '#080e20';
  ctx.fillRect(0, 0, W, H);

  // Wall gradient — lifted cool blue; ship corridor at night
  const wallGrad = ctx.createLinearGradient(0, 0, 0, FLOOR_Y);
  wallGrad.addColorStop(0,   '#1a2848');   // lifted from #0c1832
  wallGrad.addColorStop(0.5, '#263460');   // lifted from #18244e
  wallGrad.addColorStop(1,   '#1c2a50');   // lifted from #0e1a3a
  ctx.fillStyle = wallGrad;
  ctx.fillRect(0, 0, W, FLOOR_Y);

  // Ambient edge darkening
  const edgeGrad = ctx.createRadialGradient(
    W / 2, FLOOR_Y * 0.45, FLOOR_Y * 0.2,
    W / 2, FLOOR_Y * 0.45, H * 0.9
  );
  edgeGrad.addColorStop(0, 'rgba(0,0,0,0)');
  edgeGrad.addColorStop(1, 'rgba(12,6,24,0.55)');
  ctx.fillStyle = edgeGrad;
  ctx.fillRect(0, 0, W, FLOOR_Y);

  const baseboardH = 12;
  const baseboardY = FLOOR_Y - baseboardH;   // 168
  const doorH      = 110;
  const doorW      = 32;
  const doorTop    = baseboardY - doorH;     // 58
  const panelTop   = 20;
  const panelH     = baseboardY - panelTop;  // 148

  // Riveted wall panels at half camera speed
  const panelSpacing = 120;
  const panelOffset  = (camX * 0.5) % panelSpacing;
  for (let px = -panelOffset; px < W + panelSpacing; px += panelSpacing) {
    drawShipPanel(Math.round(px), panelTop, panelSpacing, panelH, {
      strokeColor: 'rgba(50,70,120,0.22)',
      rivetColor:  'rgba(60,80,130,0.38)',
    });
  }

  // Wall fixtures — one per gap between the 6 doors, all at y=85.
  // Pattern alternates porthole / sconce / porthole / sconce / porthole.
  // x positions are gap centres (doors at 80,280,480,700,920,1180):
  //   gap 1 (80→280)  x=180  porthole
  //   gap 2 (280→480) x=390  sconce
  //   gap 3 (480→700) x=600  porthole
  //   gap 4 (700→920) x=810  sconce (flickering — Beat 8 foreshadowing)
  //   gap 5 (920→1180) x=1050 porthole
  const fixtureY  = 85;
  const portholeR = 17;   // bottom edge 85+17=102; doorTop is now 58
  const PORTHOLES = [180, 600, 1050];
  const SCONCES   = [390, 810];   // 810 flickers

  for (const gx of PORTHOLES) {
    const sx = Math.round(gx - camX);
    if (sx < -(portholeR + 5) || sx > W + portholeR + 5) continue;
    drawPorthole(sx, fixtureY, portholeR, { moonlight: true, divider: true });
  }

  for (const gx of SCONCES) {
    const sx = Math.round(gx - camX);
    if (sx > W + 20 || sx < -20) continue;
    drawSconce(sx, fixtureY, { flicker: gx === 810, intensity: 0.7, now });
  }

  // Left wall (Sprint 10.7) — visible end-cap at game-world x=0.
  // Shows the hallway has a real terminus; player can see they can't go further left.
  const leftWallSX = Math.round(0 - camX);
  if (leftWallSX > -20 && leftWallSX < W + 20) {
    const lwW = 20;
    // Wall end-cap fill
    ctx.fillStyle = '#0e1428';
    ctx.fillRect(leftWallSX - lwW, 0, lwW, FLOOR_Y);
    // Wall cap edge — a dark vertical line
    ctx.strokeStyle = 'rgba(50,65,110,0.65)';
    ctx.lineWidth   = 2;
    ctx.beginPath();
    ctx.moveTo(leftWallSX, 0);
    ctx.lineTo(leftWallSX, FLOOR_Y);
    ctx.stroke();
    // Rivet strip on the cap face
    drawShipPanel(leftWallSX - lwW, panelTop, lwW, panelH, {
      strokeColor: 'rgba(50,70,120,0.30)',
      rivetColor:  'rgba(60,80,130,0.50)',
    });
  }

  // Doors — six total; grandparents' door (1180) has warm glow
  // Sprint 10.7: door at 480 is Pip's cabin door (Cabin 646)
  for (const gx of [80, 280, 480, 700, 920, 1180]) {
    const sx = Math.round(gx - camX);
    if (sx > W + doorW || sx < -doorW) continue;
    // Cabin door (480) gets a faint warm hint — it's Pip's room
    drawDoor(sx, doorTop, { w: doorW, h: doorH, warm: gx === 1180 || gx === 480 });
  }

  // Far-right dark zone (game-world x 1320–1440)
  const darkStartSx = Math.round(1320 - camX);
  if (darkStartSx < W) {
    const drawLeft  = Math.max(0, darkStartSx);
    const drawRight = Math.min(W, Math.round(HALL_W - camX));
    if (drawRight > drawLeft) {
      const dGrad = ctx.createLinearGradient(darkStartSx, 0, darkStartSx + 120, 0);
      dGrad.addColorStop(0, 'rgba(2,6,14,0)');
      dGrad.addColorStop(1, '#02060e');
      ctx.fillStyle = dGrad;
      ctx.fillRect(drawLeft, 0, drawRight - drawLeft, FLOOR_Y);
    }
  }

  // Floor surface with carpet tint — lifted base
  const floorSurfH = 20;
  const floorGrad  = ctx.createLinearGradient(0, FLOOR_Y, 0, FLOOR_Y + floorSurfH);
  floorGrad.addColorStop(0,    '#283858');   // lifted from #1a2848
  floorGrad.addColorStop(0.35, '#2e2030');   // warm-purple carpet tint
  floorGrad.addColorStop(1,    '#080e20');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, FLOOR_Y, W, floorSurfH);

  // Carpet runner
  ctx.fillStyle = 'rgba(90,18,28,0.28)';
  ctx.fillRect(0, FLOOR_Y - 3, W, 5);

  drawFloorPlanks(camX, { lineColor: 'rgba(18,30,58,0.20)' });

  // Floor line
  ctx.strokeStyle = 'rgba(90,72,120,0.45)';
  ctx.lineWidth   = 1;
  ctx.beginPath(); ctx.moveTo(0, FLOOR_Y); ctx.lineTo(W, FLOOR_Y); ctx.stroke();

  drawBaseboard(0, baseboardY, W, {
    fillColor:   'rgba(20,32,58,0.68)',
    strokeColor: 'rgba(70,55,95,0.38)',
  });
}

/* ================================================================
   PASSENGER SPRITE
   Dark formal silhouette. ~12px wide, ~28px tall. No glow — he
   is of this world, not Pip's spectral one. Walks with a grounded
   downward footstep bob.
   ================================================================ */

function drawPassenger(screenX, groundY, now) {
  // Downward footstep bob — ~400ms period, reads as living/grounded
  const bob  = Math.abs(Math.sin(now / 400)) * 2;
  const foot = Math.round(groundY + bob);
  const cx   = Math.round(screenX);

  ctx.save();
  ctx.translate(cx, foot);
  // Passenger walks left — mirror sprite to face left
  ctx.scale(-1, 1);

  drawPassengerBody();

  ctx.restore();
}

/* ---- Passenger body layer ----
   Local coords: (0,0) = center/foot. Default facing right; caller
   applies ctx.scale(-1,1) to face left. All in #2a2438, no glow. */
function drawPassengerBody() {
  ctx.fillStyle   = '#2a2438';
  ctx.globalAlpha = 0.96;
  ctx.shadowBlur  = 0;

  // Top hat crown (15×11px)
  ctx.fillRect( -7, -62, 15, 11);
  // Hat brim     (27×4px — widest point)
  ctx.fillRect(-13, -51, 27,  4);
  // Head         (13×13px)
  ctx.fillRect( -7, -47, 13, 13);
  // Collar       (9×4px)
  ctx.fillRect( -4, -34,  9,  4);
  // Coat body    (20×13px)
  ctx.fillRect( -9, -30, 20, 13);
  // Coat tails   (15×7px, slightly narrower)
  ctx.fillRect( -7, -17, 15,  7);
  // Legs         (4×7px each)
  ctx.fillRect( -7,  -9,  4,  7);
  ctx.fillRect(  2,  -9,  4,  7);
  // Shoes        (7×2px each)
  ctx.fillRect( -9,  -2,  7,  2);
  ctx.fillRect(  2,  -2,  7,  2);

  ctx.globalAlpha = 1;
}

/* ================================================================
   GRANDPARENTS' CABIN ROOM
   A small (~720px) warm interior. Cooler than the hallway — it's a
   home, not a corridor. Single dominant warm-light source: bedside lamp.
   Babcia and Dziadek are drawn before Pip so Pip renders over them.
   ================================================================ */

function drawGrandparents(camX, now) {
  // Base fill (UI zone)
  ctx.fillStyle = '#0e0a04';
  ctx.fillRect(0, 0, W, H);

  // Wall gradient — warm brown, lifted for legibility (a room lived in)
  const wallGrad = ctx.createLinearGradient(0, 0, 0, FLOOR_Y);
  wallGrad.addColorStop(0,   '#322414');   // lifted from #1e1408
  wallGrad.addColorStop(0.5, '#3c2c18');   // lifted from #241808
  wallGrad.addColorStop(1,   '#2c2010');   // lifted from #1a1208
  ctx.fillStyle = wallGrad;
  ctx.fillRect(0, 0, W, FLOOR_Y);

  // Bedside lamp warm glow (game-world ~x=590)
  const lampGX = 590;
  const lampSX = lampGX - camX;
  const lampGlow = ctx.createRadialGradient(lampSX, 100, 0, lampSX, 100, 115);
  lampGlow.addColorStop(0, 'rgba(255,200,80,0.22)');
  lampGlow.addColorStop(1, 'rgba(255,160,40,0)');
  ctx.fillStyle = lampGlow;
  ctx.fillRect(0, 0, W, FLOOR_Y);

  // Ambient edge darkening
  const edgeGrad = ctx.createRadialGradient(
    W / 2, FLOOR_Y * 0.45, FLOOR_Y * 0.2,
    W / 2, FLOOR_Y * 0.45, H * 0.9
  );
  edgeGrad.addColorStop(0, 'rgba(0,0,0,0)');
  edgeGrad.addColorStop(1, 'rgba(10,5,2,0.5)');
  ctx.fillStyle = edgeGrad;
  ctx.fillRect(0, 0, W, FLOOR_Y);

  const baseboardH = 12;
  const baseboardY = FLOOR_Y - baseboardH;   // 168
  const panelTop   = 20;
  const panelH     = baseboardY - panelTop;  // 148

  // Riveted wall panels at half camera speed
  const panelSpacing = 120;
  const panelOffset  = (camX * 0.5) % panelSpacing;
  for (let px = -panelOffset; px < W + panelSpacing; px += panelSpacing) {
    drawShipPanel(Math.round(px), panelTop, panelSpacing, panelH, {
      strokeColor: 'rgba(80,58,22,0.20)',
      rivetColor:  'rgba(90,65,25,0.38)',
    });
  }

  // --- Window (left, game-world x=80–138) ---
  const winGX = 80, winGW = 58, winRH = 90, winRY = 24;
  const winSX = Math.round(winGX - camX);
  if (winSX < W + winGW && winSX + winGW > 0) {
    ctx.fillStyle = '#1a2840';
    ctx.fillRect(winSX, winRY, winGW, winRH);
    ctx.strokeStyle = 'rgba(80,110,165,0.5)';
    ctx.lineWidth   = 1;
    ctx.beginPath(); ctx.moveTo(winSX + winGW / 2, winRY); ctx.lineTo(winSX + winGW / 2, winRY + winRH); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(winSX, winRY + winRH * 0.5); ctx.lineTo(winSX + winGW, winRY + winRH * 0.5); ctx.stroke();
    ctx.strokeStyle = '#3a2c14';   // lifted from #241808 — visible warm frame
    ctx.lineWidth   = 2;
    ctx.strokeRect(winSX - 2, winRY - 2, winGW + 4, winRH + 4);
    ctx.lineWidth   = 1;
  }

  // --- Bed (right, game-world x=440–598) ---
  // Contrast hierarchy: frame > bedding > headboard, all readable against wall
  const bedGX = 440, bedGW = 158, bedH = 22, bedY = FLOOR_Y - bedH;
  const bedSX = Math.round(bedGX - camX);
  if (bedSX < W + bedGW && bedSX + bedGW > 0) {
    // Headboard
    ctx.fillStyle = '#3a2e1a';   // lifted from #1e1408
    ctx.fillRect(bedSX + bedGW - 10, bedY - 14, 10, bedH + 14);
    ctx.strokeStyle = 'rgba(120,90,40,0.5)';
    ctx.lineWidth   = 1;
    ctx.strokeRect(bedSX + bedGW - 10, bedY - 14, 10, bedH + 14);
    // Bed frame
    ctx.fillStyle = '#302618';   // lifted from #1a1208
    ctx.fillRect(bedSX, bedY, bedGW, bedH);
    ctx.strokeStyle = 'rgba(120,90,40,0.45)';
    ctx.strokeRect(bedSX, bedY, bedGW, bedH);
    // Bedding — noticeably lighter than frame
    ctx.fillStyle = '#5a4428';
    ctx.fillRect(bedSX + 2, bedY + 2, bedGW - 14, 8);
    ctx.fillStyle = '#685030';
    ctx.fillRect(bedSX + 6, bedY + 2, 28, 6);
    ctx.fillRect(bedSX + 50, bedY + 3, 20, 5);
  }

  // --- Bedside lamp (game-world x≈590) ---
  if (lampSX > -20 && lampSX < W + 20) {
    const ls = Math.round(lampSX);
    ctx.fillStyle = '#5a4828';   // lifted stem
    ctx.fillRect(ls - 1, 110, 3, FLOOR_Y - 110);
    ctx.fillStyle = '#c87828';
    ctx.beginPath();
    ctx.moveTo(ls - 8, 126); ctx.lineTo(ls + 9, 126);
    ctx.lineTo(ls + 6, 110); ctx.lineTo(ls - 5, 110);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,200,80,0.50)';
    ctx.beginPath();
    ctx.moveTo(ls - 6, 124); ctx.lineTo(ls + 7, 124);
    ctx.lineTo(ls + 5, 112); ctx.lineTo(ls - 4, 112);
    ctx.closePath(); ctx.fill();
  }

  // --- Nightstand + photograph (game-world x=620) ---
  const nsSX = Math.round(620 - camX);
  if (nsSX > -20 && nsSX < W + 20) {
    ctx.fillStyle = '#2e2414';   // lifted from #1a1208
    ctx.fillRect(nsSX - 10, FLOOR_Y - 18, 20, 18);
    ctx.strokeStyle = 'rgba(120,90,40,0.5)';
    ctx.lineWidth   = 1;
    ctx.strokeRect(nsSX - 10, FLOOR_Y - 18, 20, 18);
    ctx.fillStyle = '#4a3a1e';
    ctx.fillRect(nsSX - 7, FLOOR_Y - 28, 14, 10);
    ctx.strokeStyle = 'rgba(150,120,65,0.65)';
    ctx.strokeRect(nsSX - 7, FLOOR_Y - 28, 14, 10);
    ctx.fillStyle = '#d4a868';
    ctx.fillRect(nsSX - 5, FLOOR_Y - 26, 10, 7);
  }

  // --- Open suitcase (game-world x=380) ---
  const scSX = Math.round(380 - camX);
  if (scSX > -40 && scSX < W + 40) {
    const scW2 = 54, scH2 = 13, scY2 = FLOOR_Y - scH2;
    ctx.fillStyle = '#3e3018';   // lifted from #2a2010
    ctx.fillRect(scSX - scW2 / 2, scY2, scW2, scH2);
    ctx.strokeStyle = 'rgba(130,100,48,0.55)';
    ctx.lineWidth   = 1;
    ctx.strokeRect(scSX - scW2 / 2, scY2, scW2, scH2);
    // Open lid
    ctx.fillStyle = '#382814';   // lifted from #241808
    ctx.beginPath();
    ctx.moveTo(scSX - scW2 / 2, scY2);
    ctx.lineTo(scSX + scW2 / 2, scY2);
    ctx.lineTo(scSX + scW2 / 2 - 4, scY2 - 14);
    ctx.lineTo(scSX - scW2 / 2 + 4, scY2 - 14);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(130,100,48,0.45)';
    ctx.stroke();
    // Shirt — more visible after lift
    ctx.fillStyle = 'rgba(80,110,165,0.38)';
    ctx.fillRect(scSX - scW2 / 2 + 3, scY2 + 2, scW2 - 6, 4);
  }

  // Floor surface
  const floorGrad = ctx.createLinearGradient(0, FLOOR_Y, 0, FLOOR_Y + 20);
  floorGrad.addColorStop(0, '#382a18');   // lifted from #241a0c
  floorGrad.addColorStop(1, '#0e0a04');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, FLOOR_Y, W, 20);

  drawFloorPlanks(camX, { lineColor: 'rgba(18,10,2,0.22)' });

  // Floor line
  ctx.strokeStyle = 'rgba(90,65,28,0.55)';
  ctx.lineWidth   = 1;
  ctx.beginPath(); ctx.moveTo(0, FLOOR_Y); ctx.lineTo(W, FLOOR_Y); ctx.stroke();

  drawBaseboard(0, baseboardY, W, {
    fillColor:   'rgba(22,14,4,0.72)',
    strokeColor: 'rgba(65,46,16,0.4)',
  });

  // --- NPCs drawn beneath Pip ---
  const dzSX = Math.round(160 - camX);
  if (dzSX > -20 && dzSX < W + 20) {
    drawDziadek(dzSX, FLOOR_Y, now);
  }

  const babSX = Math.round(560 - camX);
  if (babSX > -20 && babSX < W + 20) {
    drawBabcia(babSX, bedY, now);
  }
}

/* ---- Babcia: hunched seated figure on bed. ----
   groundY = top of bed surface. Sob-bob ~1500ms period, ~1px amp.
   One-piece silhouette; no sprite rig. */
function drawBabcia(screenX, groundY, now) {
  const bob = Math.sin(now / 1500) * 1;
  const cx  = Math.round(screenX);
  const cy  = Math.round(groundY + bob);

  ctx.save();
  ctx.translate(cx, cy);
  ctx.fillStyle   = '#2a2030';
  ctx.globalAlpha = 0.90;
  ctx.shadowBlur  = 0;

  // Hair bun
  ctx.beginPath();
  ctx.arc(7, -53, 7, 0, Math.PI * 2);
  ctx.fill();
  // Head (bowed forward)
  ctx.fillRect(-10, -48, 19, 17);
  // Hunched upper torso
  ctx.fillRect(-17, -31, 34, 19);
  // Apron hint
  ctx.globalAlpha = 0.40;
  ctx.fillStyle   = '#4a3820';
  ctx.fillRect(-12, -24, 24, 12);
  ctx.globalAlpha = 0.90;
  ctx.fillStyle   = '#2a2030';
  // Lap / skirt (wide, seated)
  ctx.fillRect(-22, -12, 43, 12);

  ctx.globalAlpha = 1;
  ctx.restore();
}

/* ---- Dziadek: standing, back to player, facing left (window). ----
   Completely still — no bob. One-piece silhouette. */
function drawDziadek(screenX, groundY, now) {
  const cx = Math.round(screenX);

  ctx.save();
  ctx.translate(cx, groundY);
  ctx.scale(-1, 1);   // face left (toward window)
  ctx.fillStyle   = '#2a2030';
  ctx.globalAlpha = 0.90;
  ctx.shadowBlur  = 0;

  ctx.fillRect(-11, -66, 24,  7);  // flat cap
  ctx.fillRect( -9, -59, 18,  4);  // cap top
  ctx.fillRect( -9, -55, 18, 15);  // head
  ctx.fillRect( -4, -40,  9,  4);  // neck
  ctx.fillRect(-15, -35, 31, 22);  // coat body
  ctx.fillRect(-11, -13, 22,  7);  // coat lower
  ctx.fillRect( -9,  -7,  7,  7);  // left leg
  ctx.fillRect(  2,  -7,  7,  7);  // right leg
  ctx.fillRect(-11,   0,  9,  2);  // left shoe
  ctx.fillRect(  2,   0,  9,  2);  // right shoe

  ctx.globalAlpha = 1;
  ctx.restore();
}

/* ================================================================
   MUSIC SYSTEM
   playMusic(trackId)  — switch to a track, crossfading if needed.
   unlockMusic()       — called on first keypress; starts playback.
   toggleMusic()       — bound to the ♪ button click.
   initMusic()         — runs at page load; reads state, wires up DOM.
   ================================================================ */

function resolveSrc(trackId) {
  if (trackId === 'monster') {
    return MONSTER_TRACKS[Math.random() < 0.5 ? 0 : 1];
  }
  return MUSIC_TRACKS[trackId] || MUSIC_TRACKS.main;
}

function playMusic(trackId) {
  const targetSrc = resolveSrc(trackId);
  const activeEl  = music.current === 'a' ? music.audioA : music.audioB;

  // No-op if the current active element is already playing this src
  if (activeEl.src.endsWith(targetSrc) && music.trackId !== null) return;

  // First call (nothing loaded yet) — just set src; no crossfade
  if (music.trackId === null) {
    activeEl.src    = targetSrc;
    activeEl.volume = music.baseVolume;
    music.trackId   = trackId;
    if (music.on && music.unlocked) {
      activeEl.play().catch(() => {});
    }
    return;
  }

  // Crossfade: ramp active out, incoming in, over ~1.2s
  const incomingEl = music.current === 'a' ? music.audioB : music.audioA;
  incomingEl.src    = targetSrc;
  incomingEl.volume = 0;

  if (music.on && music.unlocked) {
    incomingEl.play().catch(() => {});
  }

  const FADE_MS   = 1200;
  const startTime = performance.now();
  const fromVol   = activeEl.volume;

  music.crossfading = true;

  function fade(now) {
    const t = Math.min((now - startTime) / FADE_MS, 1);
    activeEl.volume  = fromVol * (1 - t);
    incomingEl.volume = music.on ? music.baseVolume * t : 0;

    if (t < 1) {
      requestAnimationFrame(fade);
    } else {
      activeEl.pause();
      activeEl.volume   = music.baseVolume;  // reset for next use
      music.current     = music.current === 'a' ? 'b' : 'a';
      music.trackId     = trackId;
      music.crossfading = false;
    }
  }
  requestAnimationFrame(fade);
}

function unlockMusic() {
  if (music.unlocked) return;
  music.unlocked = true;
  if (music.on && music.trackId !== null) {
    const activeEl = music.current === 'a' ? music.audioA : music.audioB;
    activeEl.play().catch(() => {});
  }
}

function toggleMusic() {
  music.on = !music.on;
  localStorage.setItem('tlb-music-on', music.on ? 'true' : 'false');

  const btn      = document.getElementById('music-toggle');
  const activeEl = music.current === 'a' ? music.audioA : music.audioB;

  if (music.on) {
    btn.classList.remove('muted');
    btn.title      = 'Music on (click to mute)';
    btn.setAttribute('aria-label', 'Music on (click to mute)');
    if (music.unlocked) activeEl.play().catch(() => {});
  } else {
    btn.classList.add('muted');
    btn.title      = 'Music off (click to play)';
    btn.setAttribute('aria-label', 'Music off (click to play)');
    activeEl.pause();
  }
}

function initMusic() {
  music.audioA = document.getElementById('bg-music-a');
  music.audioB = document.getElementById('bg-music-b');

  // Restore toggle state from previous session
  const saved = localStorage.getItem('tlb-music-on');
  if (saved === 'false') {
    music.on = false;
    const btn = document.getElementById('music-toggle');
    btn.classList.add('muted');
    btn.title     = 'Music off (click to play)';
    btn.setAttribute('aria-label', 'Music off (click to play)');
  }

  // Wire toggle button
  document.getElementById('music-toggle').addEventListener('click', toggleMusic);

  // Arm first-keypress unlock
  window.addEventListener('keydown', unlockMusic, { once: true });

  // Queue the opening track (src set immediately; play deferred to first keypress)
  playMusic('main');
}

/* ================================================================
   PADDING-FX LIGHTS — stars and fireflies in the decorative surround
   ================================================================ */

/* Simple seeded LCG PRNG — same pattern as pocong patch init. */
function makePadLCG(seed) {
  let s = seed >>> 0;
  return () => { s = ((s * 1664525 + 1013904223) | 0) >>> 0; return s / 0x100000000; };
}

/* Stars — 40 fixed-position cold-white pinpricks that twinkle. */
const PAD_STAR_COUNT = 40;
let padStars = null;

function initPadStars() {
  const rng = makePadLCG(0xdeadbeef);
  padStars = Array.from({ length: PAD_STAR_COUNT }, () => ({
    fx:            rng(),                           // fractional x [0, 1]
    fy:            rng(),                           // fractional y [0, 1]
    twinklePeriod: 3 + rng() * 4,                  // 3–7 seconds
    twinklePhase:  rng() * Math.PI * 2,
  }));
}

/* Fireflies — 7 warm-amber drifters with compound sine motion. */
const PAD_FF_COUNT = 20;
let padFireflies  = null;

function initPadFireflies(cw, ch) {
  const rng = makePadLCG(0xc0ffee42);
  padFireflies = Array.from({ length: PAD_FF_COUNT }, () => {
    const pi  = 4 + rng() * 4;   // pulse interval (4–8 s)
    return {
      /* Base position — the compound sines oscillate around this. */
      x: rng() * cw,
      y: rng() * ch,
      /* Two independent X oscillators: slow large sweep + fast small wobble */
      ox1: { amp: 25 + rng() * 30, period: 5 + rng() * 7, phase: rng() * Math.PI * 2 },
      ox2: { amp: 8  + rng() * 14, period: 2 + rng() * 3, phase: rng() * Math.PI * 2 },
      /* Two independent Y oscillators */
      oy1: { amp: 25 + rng() * 30, period: 5 + rng() * 7, phase: rng() * Math.PI * 2 },
      oy2: { amp: 8  + rng() * 14, period: 2 + rng() * 3, phase: rng() * Math.PI * 2 },
      /* Glow pulse */
      pulseInterval:  pi,
      pulseTimer:     rng() * pi,  // stagger so they don't pulse in sync
      pulseActive:    false,
      pulseAge:       0,
      pulseDuration:  0.4 + rng() * 0.4,
    };
  });
}

function isPaddingVisible() {
  const wrap = document.getElementById('game-wrap');
  const game = document.getElementById('game');
  if (!wrap || !game) return false;
  const wr = wrap.getBoundingClientRect();
  const gr = game.getBoundingClientRect();
  return (gr.width < wr.width - 1) || (gr.height < wr.height - 1);
}

function resizePaddingLights() {
  const el = document.getElementById('padding-lights');
  if (!el) return;
  el.width  = window.innerWidth;
  el.height = window.innerHeight;
  /* Reinit firefly base positions so they distribute across the new canvas size. */
  padFireflies = null;
}

let padLightsLastT = null;

function padLightsLoop(timestamp) {
  requestAnimationFrame(padLightsLoop);

  if (!isPaddingVisible()) {
    padLightsLastT = null;
    return;
  }

  if (!padStars) initPadStars();

  const lightCanvas = document.getElementById('padding-lights');
  if (!lightCanvas) return;
  const lctx = lightCanvas.getContext('2d');
  const cw = lightCanvas.width;
  const ch = lightCanvas.height;

  if (!padFireflies) initPadFireflies(cw, ch);

  const t  = timestamp / 1000;
  const dt = padLightsLastT !== null ? Math.min(t - padLightsLastT, 0.1) : 0;
  padLightsLastT = t;

  lctx.clearRect(0, 0, cw, ch);

  /* Game rect for firefly culling — in viewport coordinates.
     #padding-lights fills the viewport so canvas coords = viewport coords. */
  const gameEl = document.getElementById('game');
  const gr = gameEl ? gameEl.getBoundingClientRect() : null;

  /* ---- Stars ---- */
  padStars.forEach(s => {
    const sx = s.fx * cw;
    const sy = s.fy * ch;
    const alpha = 0.3 + 0.6 * (0.5 + 0.5 * Math.sin(t * (Math.PI * 2 / s.twinklePeriod) + s.twinklePhase));
    lctx.fillStyle = `rgba(232,232,240,${alpha.toFixed(3)})`;
    lctx.fillRect(Math.round(sx), Math.round(sy), 1, 1);
  });

  /* ---- Fireflies ---- */
  padFireflies.forEach(f => {
    /* Advance pulse timer */
    if (!f.pulseActive) {
      f.pulseTimer -= dt;
      if (f.pulseTimer <= 0) {
        f.pulseActive = true;
        f.pulseAge    = 0;
      }
    } else {
      f.pulseAge += dt;
      if (f.pulseAge >= f.pulseDuration) {
        f.pulseActive = false;
        f.pulseTimer  = f.pulseInterval;
      }
    }

    /* Compound sine position */
    const fx = f.x
      + Math.sin(t * (Math.PI * 2 / f.ox1.period) + f.ox1.phase) * f.ox1.amp
      + Math.sin(t * (Math.PI * 2 / f.ox2.period) + f.ox2.phase) * f.ox2.amp;
    const fy = f.y
      + Math.sin(t * (Math.PI * 2 / f.oy1.period) + f.oy1.phase) * f.oy1.amp
      + Math.sin(t * (Math.PI * 2 / f.oy2.period) + f.oy2.phase) * f.oy2.amp;

    /* Soft cull: skip drawing while over game area */
    if (gr && fx >= gr.left && fx <= gr.right && fy >= gr.top && fy <= gr.bottom) return;
    /* Skip if drifted out of canvas bounds */
    if (fx < 0 || fx > cw || fy < 0 || fy > ch) return;

    /* Glow alpha: base + pulse envelope */
    let glowAlpha = 0.12;
    if (f.pulseActive) {
      const envelope = Math.sin((f.pulseAge / f.pulseDuration) * Math.PI);
      glowAlpha = 0.12 + envelope * 0.35;
    }

    /* Glow */
    const glowR = 7;
    const grd = lctx.createRadialGradient(fx, fy, 0, fx, fy, glowR);
    grd.addColorStop(0, `rgba(255,200,104,${glowAlpha.toFixed(3)})`);
    grd.addColorStop(1, 'rgba(255,200,104,0)');
    lctx.fillStyle = grd;
    lctx.fillRect(fx - glowR, fy - glowR, glowR * 2, glowR * 2);

    /* Core 2px dot */
    const coreAlpha = Math.min(1, 0.7 + glowAlpha);
    lctx.fillStyle = `rgba(255,200,104,${coreAlpha.toFixed(3)})`;
    lctx.fillRect(Math.round(fx) - 1, Math.round(fy) - 1, 2, 2);
  });
}

/* ================================================================
   SPRINT 13: COLLECT AURA
   Warm pulsing aura for collectibles (↓ COLLECT targets).
   Distinct from the cool inspect sparkle:
     - broader radius (~12px vs 6px)
     - slower pulse (1.2s cycle)
     - saturated warm amber, no upward drift
   ================================================================ */

function drawCollectAura(ctx, x, y, proximity, now) {
  // proximity: 0..1 (1 = at peak within 18px, 0 = 60px away)
  if (proximity <= 0) return;

  const pulse = 0.7 + 0.3 * Math.sin((now / 1000) * (2 * Math.PI / 1.2));
  const alpha = proximity * pulse;

  // Outer glow
  const outerR = 12;
  const gOuter = ctx.createRadialGradient(x, y, 0, x, y, outerR);
  gOuter.addColorStop(0, `rgba(255,200,104,${(alpha * 0.55).toFixed(3)})`);
  gOuter.addColorStop(1, 'rgba(255,200,104,0)');
  ctx.fillStyle = gOuter;
  ctx.fillRect(x - outerR, y - outerR, outerR * 2, outerR * 2);

  // Inner core
  const innerR = 6;
  const gInner = ctx.createRadialGradient(x, y, 0, x, y, innerR);
  gInner.addColorStop(0, `rgba(255,200,104,${(alpha * 0.9).toFixed(3)})`);
  gInner.addColorStop(1, 'rgba(255,200,104,0)');
  ctx.fillStyle = gInner;
  ctx.fillRect(x - innerR, y - innerR, innerR * 2, innerR * 2);
}

/* Draw all collectibles' auras in the current room */
function drawCollectAuras(camX, now) {
  const room = rooms[currentRoom];
  if (!room.collectibles) return;
  for (const c of room.collectibles) {
    if (c.collected) continue;
    const cx = c.x - camX;
    const cy = FLOOR_Y - 20;
    const dist = Math.abs(pip.x - c.x);
    // Scale: 1 at dist<18, 0 at dist>60
    const proximity = dist < 60 ? Math.max(0, 1 - (dist - 18) / 42) : 0;
    drawCollectAura(ctx, cx, cy, Math.min(1, proximity), now);
    // Draw treat sprite placeholder
    drawTreatSprite(ctx, c.sprite, cx, cy);
  }
}

/* Procedural treat sprite placeholder.
   Each treat key gets a simple colored shape until commissioned art arrives. */
function drawTreatSprite(ctx, key, cx, cy) {
  // Bamsemums: small colorful bag of gummy bears
  if (key === 'bamsemums') {
    // Bag outline
    ctx.fillStyle = 'rgba(200,180,220,0.85)';
    ctx.fillRect(cx - 5, cy - 10, 10, 14);
    // Twist tie
    ctx.fillStyle = '#a09080';
    ctx.fillRect(cx - 2, cy - 12, 4, 2);
    // Bears: red, yellow, green dots
    const bears = [['#e83030', -2, 0], ['#f0c020', 1, -3], ['#30a030', 2, 2]];
    for (const [col, dx, dy] of bears) {
      ctx.fillStyle = col;
      ctx.fillRect(cx + dx, cy + dy - 3, 2, 2);
    }
    return;
  }
  // Generic fallback: warm amber diamond
  ctx.fillStyle = '#ffc868';
  ctx.fillRect(cx, cy - 8, 3, 3);
  ctx.fillRect(cx - 2, cy - 6, 7, 3);
  ctx.fillRect(cx, cy - 4, 3, 3);
}

/* ================================================================
   SPRINT 13: PICKUP TWEEN RENDERING
   Called each frame; draws active tweens on the tween-layer canvas.
   ================================================================ */

function updateAndDrawTweens(dt, now) {
  tweenCtx.clearRect(0, 0, W, H);
  const hadTweens = activeTweens.length > 0;

  for (let i = 0; i < activeTweens.length; i++) {
    const tw = activeTweens[i];
    tw.t += dt;
    const progress = Math.min(1, tw.t / tw.duration);

    // Ease-out curve with gentle arc
    const ease = 1 - Math.pow(1 - progress, 2);
    const tx = tw.sx + (tw.ex - tw.sx) * ease;
    // Arc: slight upward bulge at midpoint
    const arcLift = Math.sin(progress * Math.PI) * 20;
    const ty = tw.sy + (tw.ey - tw.sy) * ease - arcLift;

    // Draw the sprite at the tween position
    drawTreatSprite(tweenCtx, tw.sprite, tx, ty);

    if (progress >= 1 && !tw._completed) {
      tw._completed = true;
      if (tw.onComplete) tw.onComplete();
    }
  }

  // Prune completed tweens
  for (let i = activeTweens.length - 1; i >= 0; i--) {
    if (activeTweens[i]._completed) activeTweens.splice(i, 1);
  }

  // Restore controls strip once all tweens done (only if we had tweens and now they're gone)
  if (hadTweens && activeTweens.length === 0) {
    if (!notebook.open && !blinkBack.active) setRoomStrip();
  }
}

/* ================================================================
   SPRINT 13: STOMACH INDICATOR RENDER
   Procedural chewing-boy face + stomach pouch.
   Five states: full (76-100), mid (51-75), low (26-50),
                critical (1-25), dying (0).
   ================================================================ */

function renderStomachIndicator() {
  const sc  = stomachCtx;
  const v   = pip.stomach.value;
  const max = pip.stomach.max;
  const ratio = v / max;

  sc.clearRect(0, 0, 44, 56);

  // Frame: dark oval double-border
  sc.fillStyle = 'rgba(8,6,12,0.92)';
  sc.beginPath();
  sc.ellipse(22, 28, 20, 26, 0, 0, Math.PI * 2);
  sc.fill();
  sc.strokeStyle = '#3a4068';
  sc.lineWidth = 1;
  sc.beginPath();
  sc.ellipse(22, 28, 20, 26, 0, 0, Math.PI * 2);
  sc.stroke();
  sc.strokeStyle = 'rgba(140,160,200,0.22)';
  sc.beginPath();
  sc.ellipse(22, 28, 16, 22, 0, 0, Math.PI * 2);
  sc.stroke();

  // Face (top half of oval)
  // Skin tone based on state
  let skinCol = '#d4c8a8';
  let faceGlow = '#f0f8ff';
  if (v === 0) { skinCol = '#a8a898'; faceGlow = '#d0d4e0'; }
  else if (v <= 25) { skinCol = '#c8bc9c'; }

  sc.fillStyle = skinCol;
  sc.beginPath();
  sc.ellipse(22, 22, 10, 11, 0, 0, Math.PI * 2);
  sc.fill();

  // Soft glow
  const fg = sc.createRadialGradient(22, 22, 0, 22, 22, 11);
  fg.addColorStop(0, 'rgba(240,248,255,0.0)');
  fg.addColorStop(1, 'rgba(240,248,255,0.12)');
  sc.fillStyle = fg;
  sc.beginPath();
  sc.ellipse(22, 22, 10, 11, 0, 0, Math.PI * 2);
  sc.fill();

  // Eyes
  const eyeY = 20;
  if (v === 0) {
    // Dying: closed eyes
    sc.strokeStyle = '#6060a0';
    sc.lineWidth = 1;
    sc.beginPath(); sc.moveTo(18, eyeY); sc.lineTo(20, eyeY + 1); sc.stroke();
    sc.beginPath(); sc.moveTo(24, eyeY); sc.lineTo(26, eyeY + 1); sc.stroke();
  } else {
    // Eyes: two dots, wider when critical/low
    const eyeOpen = v <= 25 ? 2 : 1.5;
    sc.fillStyle = '#303050';
    sc.fillRect(18, eyeY - 1, 2, Math.ceil(eyeOpen));
    sc.fillRect(24, eyeY - 1, 2, Math.ceil(eyeOpen));
    // Whites
    sc.fillStyle = 'rgba(240,248,255,0.5)';
    sc.fillRect(18, eyeY - 2, 2, 1);
    sc.fillRect(24, eyeY - 2, 2, 1);
  }

  // Mouth
  if (v > 50) {
    // Neutral/contented: small O or slight smile
    sc.fillStyle = '#503030';
    sc.fillRect(20, 26, 4, 2);
  } else if (v > 25) {
    // Slack
    sc.fillStyle = '#503030';
    sc.fillRect(19, 26, 5, 1);
    sc.fillRect(20, 27, 3, 1);
  } else {
    // Small worried mouth
    sc.fillStyle = '#503030';
    sc.fillRect(20, 26, 3, 1);
  }

  // Stomach pouch (bottom half)
  const pouchX = 14;
  const pouchY = 35;
  const pouchW = 16;
  const pouchH = 12;

  // Pouch background
  sc.fillStyle = 'rgba(30,20,10,0.6)';
  sc.beginPath();
  sc.ellipse(22, pouchY + pouchH / 2, pouchW / 2, pouchH / 2, 0, 0, Math.PI * 2);
  sc.fill();

  // Fill level — clipped to pouch shape
  if (ratio > 0) {
    const fillH = Math.round(pouchH * ratio);
    const fillY = pouchY + pouchH - fillH;

    let fillCol = '#ffc868';
    if (v <= 25) fillCol = '#a87830';
    else if (v === 0) fillCol = '#8a7858';

    sc.save();
    sc.beginPath();
    sc.ellipse(22, pouchY + pouchH / 2, pouchW / 2, pouchH / 2, 0, 0, Math.PI * 2);
    sc.clip();

    sc.fillStyle = fillCol;
    sc.fillRect(pouchX, fillY, pouchW, fillH);
    sc.restore();
  }
}

/* ================================================================
   SPRINT 13: NOTEBOOK ICON RENDER
   Small procedural closed-book icon.
   ================================================================ */

function renderNotebookIcon() {
  const ic = notebookIconCtx;
  ic.clearRect(0, 0, 28, 36);

  // Cover
  ic.fillStyle = '#7a4c24';
  ic.fillRect(3, 2, 22, 32);

  // Spine
  ic.fillStyle = '#5a3814';
  ic.fillRect(3, 2, 4, 32);

  // Brass corner accents
  ic.fillStyle = '#c87830';
  ic.fillRect(3, 2, 3, 3);
  ic.fillRect(22, 2, 3, 3);
  ic.fillRect(3, 31, 3, 3);
  ic.fillRect(22, 31, 3, 3);

  // Page edge
  ic.fillStyle = '#e8dcc0';
  ic.fillRect(7, 4, 17, 28);

  // Faint lines on page
  ic.fillStyle = 'rgba(100,80,40,0.2)';
  for (let row = 0; row < 5; row++) {
    ic.fillRect(9, 8 + row * 5, 13, 1);
  }
}

/* ================================================================
   SPRINT 13: NOTEBOOK SCREEN
   ================================================================ */

function openNotebook() {
  notebook.open = true;
  notebook.page = 2;   // default open to Items page (most relevant for current sprint)
  renderNotebookPage();
  updateNotebookPageDots();
  document.getElementById('notebook-screen').classList.add('open');
  document.getElementById('stomach-indicator').classList.remove('visible');
  document.getElementById('notebook-icon').classList.remove('visible');
  setControlsStrip('notebook');
}

function closeNotebook() {
  notebook.open = false;
  document.getElementById('notebook-screen').classList.remove('open');
  document.getElementById('stomach-indicator').classList.add('visible');
  document.getElementById('notebook-icon').classList.add('visible');
  setRoomStrip();
}

function notebookTurnPage(dir) {
  notebook.page = Math.max(0, Math.min(2, notebook.page + dir));
  renderNotebookPage();
  updateNotebookPageDots();
}

function updateNotebookPageDots() {
  document.querySelectorAll('.notebook-page-dot').forEach(dot => {
    const page = parseInt(dot.dataset.page, 10);
    dot.classList.toggle('active', page === notebook.page);
  });
}

function renderNotebookPage() {
  const leftTitle  = document.getElementById('notebook-left-title');
  const rightTitle = document.getElementById('notebook-right-title');
  const leftCont   = document.getElementById('notebook-left-content');
  const rightCont  = document.getElementById('notebook-right-content');

  if (notebook.page === 0) {
    leftTitle.textContent  = 'Recipes';
    rightTitle.textContent = 'Memories';
    leftCont.className     = 'notebook-empty-note';
    leftCont.textContent   = 'Recipe unlocked after first meal.';
    rightCont.className    = 'notebook-empty-note';
    rightCont.textContent  = 'Memories collected here.';
  } else if (notebook.page === 1) {
    leftTitle.textContent  = 'Monster Moment';
    rightTitle.textContent = 'Meal Moment';
    leftCont.className     = 'notebook-empty-note';
    leftCont.textContent   = 'No memory yet.';
    rightCont.className    = 'notebook-empty-note';
    rightCont.textContent  = 'No memory yet.';
  } else {
    // Items page
    leftTitle.textContent  = 'Items';
    rightTitle.textContent = '';
    renderNotebookItems();
  }
}

function renderNotebookItems() {
  if (notebook.page !== 2) return;
  const leftCont  = document.getElementById('notebook-left-content');
  const rightCont = document.getElementById('notebook-right-content');
  rightCont.textContent = '';
  rightCont.className   = '';

  if (notebook.items.length === 0) {
    leftCont.className   = 'notebook-empty-note';
    leftCont.textContent = 'Nothing yet.';
    return;
  }

  // Build item grid
  leftCont.className = 'notebook-items-grid';
  leftCont.innerHTML = '';

  for (const item of notebook.items) {
    const card = document.createElement('div');
    card.className = 'notebook-item-card';
    if (item.kind === 'item' && item.used) card.style.opacity = '0.4';

    // Icon: small inline canvas
    const iconCanvas = document.createElement('canvas');
    iconCanvas.width  = 16;
    iconCanvas.height = 16;
    iconCanvas.className = 'notebook-item-icon';
    const ic = iconCanvas.getContext('2d');
    ic.imageSmoothingEnabled = false;
    drawTreatSprite(ic, item.sprite, 8, 12);
    card.appendChild(iconCanvas);

    const name = document.createElement('div');
    name.className   = 'notebook-item-name';
    name.textContent = item.name;
    if (item.kind === 'item' && item.used) {
      name.style.textDecoration = 'line-through';
    }
    card.appendChild(name);

    const ann = document.createElement('div');
    ann.className   = 'notebook-item-annotation';
    ann.textContent = item.annotation;
    card.appendChild(ann);

    leftCont.appendChild(card);
  }
}

/* ================================================================
   SPRINT 13: BLINK-BACK
   When stomach reaches 0: fade Pip, black screen, respawn.
   See 03b-ui-spec.md §9 (Blink-back).
   ================================================================ */

function triggerBlinkBack() {
  if (blinkBack.active) return;
  blinkBack.active  = true;
  blinkBack.phase   = 'fading';
  blinkBack.timer   = 0;
  blinkBack.pipAlpha = 1.0;

  // Hide controls
  setControlsStrip('');
  // Hide HUD
  document.getElementById('stomach-indicator').classList.remove('visible');
  document.getElementById('notebook-icon').classList.remove('visible');
}

function updateBlinkBack(dt) {
  if (!blinkBack.active) return;
  blinkBack.timer += dt;

  const overlay   = document.getElementById('blink-back-overlay');
  const blinkText = document.getElementById('blink-back-text');

  switch (blinkBack.phase) {
    case 'fading':
      blinkBack.pipAlpha = Math.max(0.05, 1 - blinkBack.timer / BLINK_FADE_T);
      // Fade overlay in during last 0.3s of the fade
      if (blinkBack.timer > BLINK_FADE_T - 0.3) {
        const t = (blinkBack.timer - (BLINK_FADE_T - 0.3)) / 0.3;
        overlay.style.opacity = Math.min(1, t).toFixed(3);
      }
      if (blinkBack.timer >= BLINK_FADE_T) {
        blinkBack.phase = 'black';
        blinkBack.timer = 0;
        overlay.style.opacity = '1';
      }
      break;

    case 'black':
      if (blinkBack.timer >= BLINK_BLACK_T) {
        // Respawn Pip
        const room = rooms[currentRoom];
        pip.x = room.pipEntryX ? room.pipEntryX.fromLeft : room.pipMinX + 8;
        pip.stomach.value = pip.stomach.baseline;
        blinkBack.pipAlpha = 0.05;
        blinkBack.phase = 'rising';
        blinkBack.timer = 0;
        overlay.style.opacity = '0';
        renderStomachIndicator();
      }
      break;

    case 'rising':
      blinkBack.pipAlpha = Math.min(0.85, 0.05 + (blinkBack.timer / BLINK_RISE_T) * 0.8);
      if (blinkBack.timer >= BLINK_RISE_T) {
        blinkBack.pipAlpha = 0.85;
        blinkBack.phase = 'narrating';
        blinkBack.timer = 0;
        blinkText.style.opacity = '1';
      }
      break;

    case 'narrating':
      if (blinkBack.timer >= BLINK_TEXT_T) {
        blinkText.style.opacity = '0';
        blinkBack.phase  = 'idle';
        blinkBack.active = false;
        blinkBack.timer  = 0;
        blinkBack.pipAlpha = 1.0;
        // Restore HUD
        document.getElementById('stomach-indicator').classList.add('visible');
        document.getElementById('notebook-icon').classList.add('visible');
        setRoomStrip();
      }
      break;
  }
}

/* ================================================================
   SPRINT 13: HUD VISIBILITY
   Show/hide HUD based on game state (cinematic, notebook, etc.)
   Called from within existing show/hide cinematic logic.
   ================================================================ */

function showHUD() {
  document.getElementById('stomach-indicator').classList.add('visible');
  document.getElementById('notebook-icon').classList.add('visible');
}

function hideHUD() {
  document.getElementById('stomach-indicator').classList.remove('visible');
  document.getElementById('notebook-icon').classList.remove('visible');
}

/* ================================================================
   SPRINT 13: NOTEBOOK ICON CLICK
   ================================================================ */

document.getElementById('notebook-icon').addEventListener('click', () => {
  if (!notebook.open && !blinkBack.active && !dialogue.active && !cinematic.active) {
    openNotebook();
  }
});

setControlsStrip('');
resizePaddingLights();
