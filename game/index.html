  ctx.fillRect(-4, -39,  9, 2);   // cap crown
  ctx.fillRect(-5, -37, 10, 8);   // head
  ctx.fillRect(-2, -29,  4, 3);   // neck
  ctx.fillRect(-9, -26, 18, 3);   // shoulders
  ctx.fillRect(-7, -23, 14, 12);  // coat body
  ctx.fillRect(-10,-23,  3, 14);  // left arm
  ctx.fillRect(  7, -23, 3, 14);  // right arm
  ctx.fillRect(-6, -11, 12, 4);   // coat lower
  ctx.fillRect(-5,  -7,  4, 7);   // left leg
  ctx.fillRect( 1,  -7,  4, 7);   // right leg
  ctx.fillRect(-6,   0,  5, 2);   // left shoe
  ctx.fillRect( 1,   0,  5, 2);   // right shoe

/* Babcia in cinematic — hunched-seated figure, slightly more detail */
function drawCinBabcia(cx, groundY) {
  ctx.save();
  ctx.translate(cx, groundY);
  ctx.fillStyle   = '#2a2030';
  ctx.globalAlpha = 0.90;
  ctx.shadowBlur  = 0;

  // Hair bun
  ctx.beginPath();

  // Upper torso / hunched
  ctx.fillRect(-7, -19, 15,  8);

  ctx.fillStyle   = '#4a3820';
  ctx.fillRect(-6, -15, 12,  5);
  ctx.globalAlpha = 0.90;
  ctx.fillStyle   = '#2a2030';
  // Lap / skirt (wide, seated)
  ctx.fillRect(-10, -11, 20,  11);
  // Hands folded
  ctx.fillRect(-3,  -13,  6,   3);

/* Subtle dust motes drifting in the lamp's light cone */
function drawDustMotes(now) {
  const MOTES = [
    { ox: 422, oy:  82, freq: 0.00041, phase: 0.0 },
    { ox: 440, oy: 102, freq: 0.00037, phase: 1.2 },
    { ox: 460, oy: 122, freq: 0.00044, phase: 2.5 },
    { ox: 432, oy:  62, freq: 0.00039, phase: 3.8 },
    { ox: 412, oy: 112, freq: 0.00042, phase: 0.7 },
    { ox: 448, oy: 142, freq: 0.00036, phase: 1.9 },
  ];
  ctx.save();
  ctx.fillStyle = 'rgba(255,220,140,1)';
  for (const m of MOTES) {
    const x     = m.ox + Math.sin(now * m.freq + m.phase) * 8;
    const y     = m.oy + Math.cos(now * m.freq * 0.7 + m.phase) * 5;
    const alpha = 0.28 + Math.sin(now * m.freq * 1.3 + m.phase) * 0.14;
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(x, y, 1, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

/* ================================================================
   HALLWAY BACKGROUND
   Ship corridor — 1440px wide. Doors, sconces, red carpet tint,
   far-right dark zone. Same palette family as the cabin.
   ================================================================ */

function drawHallway(camX, now) {
  // Base fill
  ctx.fillStyle = '#080e20';
  ctx.fillRect(0, 0, W, H);

  // Wall gradient — lifted cool blue; ship corridor at night
  const wallGrad = ctx.createLinearGradient(0, 0, 0, FLOOR_Y);
  wallGrad.addColorStop(0,   '#1a2848');   // lifted from #0c1832
  wallGrad.addColorStop(0.5, '#263460');   // lifted from #18244e
  wallGrad.addColorStop(1,   '#1c2a50');   // lifted from #0e1a3a
  ctx.fillStyle = wallGrad;
  ctx.fillRect(0, 0, W, FLOOR_Y);

  // Ambient edge darkening
  const edgeGrad = ctx.createRadialGradient(
    W / 2, FLOOR_Y * 0.45, FLOOR_Y * 0.2,
    W / 2, FLOOR_Y * 0.45, H * 0.9
  );
  edgeGrad.addColorStop(0, 'rgba(0,0,0,0)');
  edgeGrad.addColorStop(1, 'rgba(12,6,24,0.55)');
  ctx.fillStyle = edgeGrad;
  ctx.fillRect(0, 0, W, FLOOR_Y);

  const baseboardH = 12;
  const baseboardY = FLOOR_Y - baseboardH;   // 168
  const doorH      = 110;
  const doorW      = 32;
  const doorTop    = baseboardY - doorH;     // 58
  const panelTop   = 20;
  const panelH     = baseboardY - panelTop;  // 148

  // Riveted wall panels at half camera speed
  const panelSpacing = 120;
  const panelOffset  = (camX * 0.5) % panelSpacing;
  for (let px = -panelOffset; px < W + panelSpacing; px += panelSpacing) {
    drawShipPanel(Math.round(px), panelTop, panelSpacing, panelH, {
      strokeColor: 'rgba(50,70,120,0.22)',
      rivetColor:  'rgba(60,80,130,0.38)',
    });
  }

  // Wall fixtures — one per gap between the 6 doors, all at y=85.
  // Pattern alternates porthole / sconce / porthole / sconce / porthole.
  // x positions are gap centres (doors at 80,280,480,700,920,1180):
  //   gap 1 (80→280)  x=180  porthole
  //   gap 2 (280→480) x=390  sconce
  //   gap 3 (480→700) x=600  porthole
  //   gap 4 (700→920) x=810  sconce (flickering — Beat 8 foreshadowing)
  //   gap 5 (920→1180) x=1050 porthole
  const fixtureY  = 85;
  const portholeR = 17;   // bottom edge 85+17=102; doorTop is now 58
  const PORTHOLES = [180, 600, 1050];
  const SCONCES   = [390, 810];   // 810 flickers

  for (const gx of PORTHOLES) {
    const sx = Math.round(gx - camX);
    if (sx < -(portholeR + 5) || sx > W + portholeR + 5) continue;
    drawPorthole(sx, fixtureY, portholeR, { moonlight: true, divider: true });
  }

  for (const gx of SCONCES) {
    const sx = Math.round(gx - camX);
    if (sx > W + 20 || sx < -20) continue;
    drawSconce(sx, fixtureY, { flicker: gx === 810, intensity: 0.7, now });
  }

  // Doors — six total; grandparents' door (1180) has warm glow
  for (const gx of [80, 280, 480, 700, 920, 1180]) {
    const sx = Math.round(gx - camX);
    if (sx > W + doorW || sx < -doorW) continue;
    drawDoor(sx, doorTop, { w: doorW, h: doorH, warm: gx === 1180 });
  }

  // Far-right dark zone (game-world x 1320–1440)
  const darkStartSx = Math.round(1320 - camX);
  if (darkStartSx < W) {
    const drawLeft  = Math.max(0, darkStartSx);
    const drawRight = Math.min(W, Math.round(HALL_W - camX));
    if (drawRight > drawLeft) {
      const dGrad = ctx.createLinearGradient(darkStartSx, 0, darkStartSx + 120, 0);
      dGrad.addColorStop(0, 'rgba(2,6,14,0)');
      dGrad.addColorStop(1, '#02060e');
      ctx.fillStyle = dGrad;
      ctx.fillRect(drawLeft, 0, drawRight - drawLeft, FLOOR_Y);
    }
  }

  // Floor surface with carpet tint — lifted base
  const floorSurfH = 20;
  const floorGrad  = ctx.createLinearGradient(0, FLOOR_Y, 0, FLOOR_Y + floorSurfH);
  floorGrad.addColorStop(0,    '#283858');   // lifted from #1a2848
  floorGrad.addColorStop(0.35, '#2e2030');   // warm-purple carpet tint
  floorGrad.addColorStop(1,    '#080e20');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, FLOOR_Y, W, floorSurfH);

  // Carpet runner
  ctx.fillStyle = 'rgba(90,18,28,0.28)';
  ctx.fillRect(0, FLOOR_Y - 3, W, 5);

  drawFloorPlanks(camX, { lineColor: 'rgba(18,30,58,0.20)' });

  // Floor line
  ctx.strokeStyle = 'rgba(90,72,120,0.45)';
  ctx.lineWidth   = 1;
  ctx.beginPath(); ctx.moveTo(0, FLOOR_Y); ctx.lineTo(W, FLOOR_Y); ctx.stroke();

  drawBaseboard(0, baseboardY, W, {
    fillColor:   'rgba(20,32,58,0.68)',
    strokeColor: 'rgba(70,55,95,0.38)',
  });
}

/* ================================================================
   PASSENGER SPRITE
   Dark formal silhouette. ~12px wide, ~28px tall. No glow — he
   is of this world, not Pip's spectral one. Walks with a grounded
   downward footstep bob.
   ================================================================ */

function drawPassenger(screenX, groundY, now) {
  // Downward footstep bob — ~400ms period, reads as living/grounded
  const bob  = Math.abs(Math.sin(now / 400)) * 2;
  const foot = Math.round(groundY + bob);
  const cx   = Math.round(screenX);

  ctx.save();
  ctx.translate(cx, foot);
  // Passenger walks left — mirror sprite to face left
  ctx.scale(-1, 1);

  drawPassengerBody();

  ctx.restore();
}

/* ---- Passenger body layer ----
   Local coords: (0,0) = center/foot. Default facing right; caller
   applies ctx.scale(-1,1) to face left. All in #2a2438, no glow. */
function drawPassengerBody() {
  ctx.fillStyle   = '#2a2438';
  ctx.globalAlpha = 0.96;
  ctx.shadowBlur  = 0;

  // Top hat crown (15×11px)
  ctx.fillRect( -7, -62, 15, 11);
  // Hat brim     (27×4px — widest point)
  ctx.fillRect(-13, -51, 27,  4);
  // Head         (13×13px)
  ctx.fillRect( -7, -47, 13, 13);
  // Collar       (9×4px)
  ctx.fillRect( -4, -34,  9,  4);
  // Coat body    (20×13px)
  ctx.fillRect( -9, -30, 20, 13);
  // Coat tails   (15×7px, slightly narrower)
  ctx.fillRect( -7, -17, 15,  7);
  // Legs         (4×7px each)
  ctx.fillRect( -7,  -9,  4,  7);
  ctx.fillRect(  2,  -9,  4,  7);
  // Shoes        (7×2px each)
  ctx.fillRect( -9,  -2,  7,  2);
  ctx.fillRect(  2,  -2,  7,  2);

  ctx.globalAlpha = 1;
}

/* ================================================================
   GRANDPARENTS' CABIN ROOM
   A small (~720px) warm interior. Cooler than the hallway — it's a
   home, not a corridor. Single dominant warm-light source: bedside lamp.
   Babcia and Dziadek are drawn before Pip so Pip renders over them.
   ================================================================ */

function drawGrandparents(camX, now) {
  // Base fill (UI zone)
  ctx.fillStyle = '#0e0a04';
  ctx.fillRect(0, 0, W, H);

  // Wall gradient — warm brown, lifted for legibility (a room lived in)
  const wallGrad = ctx.createLinearGradient(0, 0, 0, FLOOR_Y);
  wallGrad.addColorStop(0,   '#322414');   // lifted from #1e1408
  wallGrad.addColorStop(0.5, '#3c2c18');   // lifted from #241808
  wallGrad.addColorStop(1,   '#2c2010');   // lifted from #1a1208
  ctx.fillStyle = wallGrad;
  ctx.fillRect(0, 0, W, FLOOR_Y);

  // Bedside lamp warm glow (game-world ~x=590)
  const lampGX = 590;
  const lampSX = lampGX - camX;
  const lampGlow = ctx.createRadialGradient(lampSX, 100, 0, lampSX, 100, 115);
  lampGlow.addColorStop(0, 'rgba(255,200,80,0.22)');
  lampGlow.addColorStop(1, 'rgba(255,160,40,0)');
  ctx.fillStyle = lampGlow;
  ctx.fillRect(0, 0, W, FLOOR_Y);

  // Ambient edge darkening
  const edgeGrad = ctx.createRadialGradient(
    W / 2, FLOOR_Y * 0.45, FLOOR_Y * 0.2,
    W / 2, FLOOR_Y * 0.45, H * 0.9
  );
  edgeGrad.addColorStop(0, 'rgba(0,0,0,0)');
  edgeGrad.addColorStop(1, 'rgba(10,5,2,0.5)');
  ctx.fillStyle = edgeGrad;
  ctx.fillRect(0, 0, W, FLOOR_Y);

  const baseboardH = 12;
  const baseboardY = FLOOR_Y - baseboardH;   // 168
  const panelTop   = 20;
  const panelH     = baseboardY - panelTop;  // 148

  // Riveted wall panels at half camera speed
  const panelSpacing = 120;
  const panelOffset  = (camX * 0.5) % panelSpacing;
  for (let px = -panelOffset; px < W + panelSpacing; px += panelSpacing) {
    drawShipPanel(Math.round(px), panelTop, panelSpacing, panelH, {
      strokeColor: 'rgba(80,58,22,0.20)',
      rivetColor:  'rgba(90,65,25,0.38)',
    });
  }

  // --- Window (left, game-world x=80–138) ---
  const winGX = 80, winGW = 58, winRH = 90, winRY = 24;
  const winSX = Math.round(winGX - camX);
  if (winSX < W + winGW && winSX + winGW > 0) {
    ctx.fillStyle = '#1a2840';
    ctx.fillRect(winSX, winRY, winGW, winRH);
    ctx.strokeStyle = 'rgba(80,110,165,0.5)';
    ctx.lineWidth   = 1;
    ctx.beginPath(); ctx.moveTo(winSX + winGW / 2, winRY); ctx.lineTo(winSX + winGW / 2, winRY + winRH); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(winSX, winRY + winRH * 0.5); ctx.lineTo(winSX + winGW, winRY + winRH * 0.5); ctx.stroke();
    ctx.strokeStyle = '#3a2c14';   // lifted from #241808 — visible warm frame
    ctx.lineWidth   = 2;
    ctx.strokeRect(winSX - 2, winRY - 2, winGW + 4, winRH + 4);
    ctx.lineWidth   = 1;
  }

  // --- Bed (right, game-world x=440–598) ---
  // Contrast hierarchy: frame > bedding > headboard, all readable against wall
  const bedGX = 440, bedGW = 158, bedH = 22, bedY = FLOOR_Y - bedH;
  const bedSX = Math.round(bedGX - camX);
  if (bedSX < W + bedGW && bedSX + bedGW > 0) {
    // Headboard
    ctx.fillStyle = '#3a2e1a';   // lifted from #1e1408
    ctx.fillRect(bedSX + bedGW - 10, bedY - 14, 10, bedH + 14);
    ctx.strokeStyle = 'rgba(120,90,40,0.5)';
    ctx.lineWidth   = 1;
    ctx.strokeRect(bedSX + bedGW - 10, bedY - 14, 10, bedH + 14);
    // Bed frame
    ctx.fillStyle = '#302618';   // lifted from #1a1208
    ctx.fillRect(bedSX, bedY, bedGW, bedH);
    ctx.strokeStyle = 'rgba(120,90,40,0.45)';
    ctx.strokeRect(bedSX, bedY, bedGW, bedH);
    // Bedding — noticeably lighter than frame
    ctx.fillStyle = '#5a4428';
    ctx.fillRect(bedSX + 2, bedY + 2, bedGW - 14, 8);
    ctx.fillStyle = '#685030';
    ctx.fillRect(bedSX + 6, bedY + 2, 28, 6);
    ctx.fillRect(bedSX + 50, bedY + 3, 20, 5);
  }

  // --- Bedside lamp (game-world x≈590) ---
  if (lampSX > -20 && lampSX < W + 20) {
    const ls = Math.round(lampSX);
    ctx.fillStyle = '#5a4828';   // lifted stem
    ctx.fillRect(ls - 1, 110, 3, FLOOR_Y - 110);
    ctx.fillStyle = '#c87828';
    ctx.beginPath();
    ctx.moveTo(ls - 8, 126); ctx.lineTo(ls + 9, 126);
    ctx.lineTo(ls + 6, 110); ctx.lineTo(ls - 5, 110);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,200,80,0.50)';
    ctx.beginPath();
    ctx.moveTo(ls - 6, 124); ctx.lineTo(ls + 7, 124);
    ctx.lineTo(ls + 5, 112); ctx.lineTo(ls - 4, 112);
    ctx.closePath(); ctx.fill();
  }

  // --- Nightstand + photograph (game-world x=620) ---
  const nsSX = Math.round(620 - camX);
  if (nsSX > -20 && nsSX < W + 20) {
    ctx.fillStyle = '#2e2414';   // lifted from #1a1208
    ctx.fillRect(nsSX - 10, FLOOR_Y - 18, 20, 18);
    ctx.strokeStyle = 'rgba(120,90,40,0.5)';
    ctx.lineWidth   = 1;
    ctx.strokeRect(nsSX - 10, FLOOR_Y - 18, 20, 18);
    ctx.fillStyle = '#4a3a1e';
    ctx.fillRect(nsSX - 7, FLOOR_Y - 28, 14, 10);
    ctx.strokeStyle = 'rgba(150,120,65,0.65)';
    ctx.strokeRect(nsSX - 7, FLOOR_Y - 28, 14, 10);
    ctx.fillStyle = '#d4a868';
    ctx.fillRect(nsSX - 5, FLOOR_Y - 26, 10, 7);
  }

  // --- Open suitcase (game-world x=380) ---
  const scSX = Math.round(380 - camX);
  if (scSX > -40 && scSX < W + 40) {
    const scW2 = 54, scH2 = 13, scY2 = FLOOR_Y - scH2;
    ctx.fillStyle = '#3e3018';   // lifted from #2a2010
    ctx.fillRect(scSX - scW2 / 2, scY2, scW2, scH2);
    ctx.strokeStyle = 'rgba(130,100,48,0.55)';
    ctx.lineWidth   = 1;
    ctx.strokeRect(scSX - scW2 / 2, scY2, scW2, scH2);
    // Open lid
    ctx.fillStyle = '#382814';   // lifted from #241808
    ctx.beginPath();
    ctx.moveTo(scSX - scW2 / 2, scY2);
    ctx.lineTo(scSX + scW2 / 2, scY2);
    ctx.lineTo(scSX + scW2 / 2 - 4, scY2 - 14);
    ctx.lineTo(scSX - scW2 / 2 + 4, scY2 - 14);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(130,100,48,0.45)';
    ctx.stroke();
    // Shirt — more visible after lift
    ctx.fillStyle = 'rgba(80,110,165,0.38)';
    ctx.fillRect(scSX - scW2 / 2 + 3, scY2 + 2, scW2 - 6, 4);
  }

  // Floor surface
  const floorGrad = ctx.createLinearGradient(0, FLOOR_Y, 0, FLOOR_Y + 20);
  floorGrad.addColorStop(0, '#382a18');   // lifted from #241a0c
  floorGrad.addColorStop(1, '#0e0a04');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, FLOOR_Y, W, 20);

  drawFloorPlanks(camX, { lineColor: 'rgba(18,10,2,0.22)' });

  // Floor line
  ctx.strokeStyle = 'rgba(90,65,28,0.55)';
  ctx.lineWidth   = 1;
  ctx.beginPath(); ctx.moveTo(0, FLOOR_Y); ctx.lineTo(W, FLOOR_Y); ctx.stroke();

  drawBaseboard(0, baseboardY, W, {
    fillColor:   'rgba(22,14,4,0.72)',
    strokeColor: 'rgba(65,46,16,0.4)',
  });

  // --- NPCs drawn beneath Pip ---
  const dzSX = Math.round(160 - camX);
  if (dzSX > -20 && dzSX < W + 20) {
    drawDziadek(dzSX, FLOOR_Y, now);
  }

  const babSX = Math.round(560 - camX);
  if (babSX > -20 && babSX < W + 20) {
    drawBabcia(babSX, bedY, now);
  }
}

/* ---- Babcia: hunched seated figure on bed. ----
   groundY = top of bed surface. Sob-bob ~1500ms period, ~1px amp.
   One-piece silhouette; no sprite rig. */
function drawBabcia(screenX, groundY, now) {
  const bob = Math.sin(now / 1500) * 1;
  const cx  = Math.round(screenX);
  const cy  = Math.round(groundY + bob);

  ctx.save();
  ctx.translate(cx, cy);
  ctx.fillStyle   = '#2a2030';
  ctx.globalAlpha = 0.90;
  ctx.shadowBlur  = 0;

  // Hair bun
  ctx.beginPath();
  ctx.arc(7, -53, 7, 0, Math.PI * 2);
  ctx.fill();
  // Head (bowed forward)
  ctx.fillRect(-10, -48, 19, 17);
  // Hunched upper torso
  ctx.fillRect(-17, -31, 34, 19);
  // Apron hint
  ctx.globalAlpha = 0.40;
  ctx.fillStyle   = '#4a3820';
  ctx.fillRect(-12, -24, 24, 12);
  ctx.globalAlpha = 0.90;
  ctx.fillStyle   = '#2a2030';
  // Lap / skirt (wide, seated)
  ctx.fillRect(-22, -12, 43, 12);

  ctx.globalAlpha = 1;
  ctx.restore();
}

/* ---- Dziadek: standing, back to player, facing left (window). ----
   Completely still — no bob. One-piece silhouette. */
function drawDziadek(screenX, groundY, now) {
  const cx = Math.round(screenX);

  ctx.save();
  ctx.translate(cx, groundY);
  ctx.scale(-1, 1);   // face left (toward window)
  ctx.fillStyle   = '#2a2030';
  ctx.globalAlpha = 0.90;
  ctx.shadowBlur  = 0;

  ctx.fillRect(-11, -66, 24,  7);  // flat cap
  ctx.fillRect( -9, -59, 18,  4);  // cap top
  ctx.fillRect( -9, -55, 18, 15);  // head
  ctx.fillRect( -4, -40,  9,  4);  // neck
  ctx.fillRect(-15, -35, 31, 22);  // coat body
  ctx.fillRect(-11, -13, 22,  7);  // coat lower
  ctx.fillRect( -9,  -7,  7,  7);  // left leg
  ctx.fillRect(  2,  -7,  7,  7);  // right leg
  ctx.fillRect(-11,   0,  9,  2);  // left shoe
  ctx.fillRect(  2,   0,  9,  2);  // right shoe

  ctx.globalAlpha = 1;
  ctx.restore();
}

/* ================================================================
   MUSIC SYSTEM
   playMusic(trackId)  — switch to a track, crossfading if needed.
   unlockMusic()       — called on first keypress; starts playback.
   toggleMusic()       — bound to the ♪ button click.
   initMusic()         — runs at page load; reads state, wires up DOM.
   ================================================================ */

function resolveSrc(trackId) {
  if (trackId === 'monster') {
    return MONSTER_TRACKS[Math.random() < 0.5 ? 0 : 1];
  }
  return MUSIC_TRACKS[trackId] || MUSIC_TRACKS.main;
}

function playMusic(trackId) {
  const targetSrc = resolveSrc(trackId);
  const activeEl  = music.current === 'a' ? music.audioA : music.audioB;

  // No-op if the current active element is already playing this src
  if (activeEl.src.endsWith(targetSrc) && music.trackId !== null) return;

  // First call (nothing loaded yet) — just set src; no crossfade
  if (music.trackId === null) {
    activeEl.src    = targetSrc;
    activeEl.volume = music.baseVolume;
    music.trackId   = trackId;
    if (music.on && music.unlocked) {
      activeEl.play().catch(() => {});
    }
    return;
  }

  // Crossfade: ramp active out, incoming in, over ~1.2s
  const incomingEl = music.current === 'a' ? music.audioB : music.audioA;
  incomingEl.src    = targetSrc;
  incomingEl.volume = 0;

  if (music.on && music.unlocked) {
    incomingEl.play().catch(() => {});
  }

  const FADE_MS   = 1200;
  const startTime = performance.now();
  const fromVol   = activeEl.volume;

  music.crossfading = true;

  function fade(now) {
    const t = Math.min((now - startTime) / FADE_MS, 1);
    activeEl.volume  = fromVol * (1 - t);
    incomingEl.volume = music.on ? music.baseVolume * t : 0;

    if (t < 1) {
      requestAnimationFrame(fade);
    } else {
      activeEl.pause();
      activeEl.volume   = music.baseVolume;  // reset for next use
      music.current     = music.current === 'a' ? 'b' : 'a';
      music.trackId     = trackId;
      music.crossfading = false;
    }
  }
  requestAnimationFrame(fade);
}

function unlockMusic() {
  if (music.unlocked) return;
  music.unlocked = true;
  if (music.on && music.trackId !== null) {
    const activeEl = music.current === 'a' ? music.audioA : music.audioB;
    activeEl.play().catch(() => {});
  }
}

function toggleMusic() {
  music.on = !music.on;
  localStorage.setItem('tlb-music-on', music.on ? 'true' : 'false');

  const btn      = document.getElementById('music-toggle');
  const activeEl = music.current === 'a' ? music.audioA : music.audioB;

  if (music.on) {
    btn.classList.remove('muted');
    btn.title      = 'Music on (click to mute)';
    btn.setAttribute('aria-label', 'Music on (click to mute)');
    if (music.unlocked) activeEl.play().catch(() => {});
  } else {
    btn.classList.add('muted');
    btn.title      = 'Music off (click to play)';
    btn.setAttribute('aria-label', 'Music off (click to play)');
    activeEl.pause();
  }
}

function initMusic() {
  music.audioA = document.getElementById('bg-music-a');
  music.audioB = document.getElementById('bg-music-b');

  // Restore toggle state from previous session
  const saved = localStorage.getItem('tlb-music-on');
  if (saved === 'false') {
    music.on = false;
    const btn = document.getElementById('music-toggle');
    btn.classList.add('muted');
    btn.title     = 'Music off (click to play)';
    btn.setAttribute('aria-label', 'Music off (click to play)');
  }

  // Wire toggle button
  document.getElementById('music-toggle').addEventListener('click', toggleMusic);

  // Arm first-keypress unlock
  window.addEventListener('keydown', unlockMusic, { once: true });

  // Queue the opening track (src set immediately; play deferred to first keypress)
  playMusic('main');
}

/* ================================================================
   KICK OFF
   ================================================================ */

initMusic();
setRoomStrip();
requestAnimationFrame(loop);

</script>
